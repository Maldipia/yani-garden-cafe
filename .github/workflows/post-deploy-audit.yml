name: Post-deploy audit

on:
  push:
    branches: [main]

jobs:
  audit:
    name: Full system audit
    runs-on: ubuntu-latest
    # Wait for Vercel to finish deploying (~90s)
    steps:
      - name: Wait for Vercel deploy
        run: sleep 100

      - name: Run full audit
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, sys, time

          BASE   = "https://pos.yanigardencafe.com/api/pos"
          HEALTH = "https://pos.yanigardencafe.com/api/health"

          results = []
          def chk(label, passed, detail=""):
              results.append((passed, label))
              icon = "✅" if passed else "❌"
              print(f"  {icon} {label}{(' — '+str(detail)) if detail else ''}")

          def post(url, data, token=None, timeout=20):
              h = {"Content-Type": "application/json"}
              if token: h["Authorization"] = f"Bearer {token}"
              try:
                  r = urllib.request.urlopen(urllib.request.Request(
                      url, json.dumps(data).encode(), headers=h, method="POST"), timeout=timeout)
                  return json.loads(r.read()), r.getcode()
              except urllib.request.HTTPError as e:
                  try: b = json.loads(e.read().decode())
                  except: b = {}
                  return b, e.code

          def get(url):
              try:
                  r = urllib.request.urlopen(url, timeout=10)
                  return r.read(200).decode("utf-8","ignore"), r.getcode()
              except urllib.request.HTTPError as e:
                  return "", e.code

          # 1. Health
          _, code = get(HEALTH)
          chk("Health endpoint", code == 200, f"HTTP {code}")

          # 2. All 4 PINs
          owner,_ = post(BASE, {"action":"verifyUserPin","pin":"2026"})
          admin,_ = post(BASE, {"action":"verifyUserPin","pin":"2233"})
          kit,_   = post(BASE, {"action":"verifyUserPin","pin":"9012"})
          chk("Owner PIN 2026", owner.get("ok") and owner.get("role")=="OWNER")
          chk("Admin PIN 2233", admin.get("ok") and admin.get("role")=="ADMIN")
          chk("Kitchen PIN 9012", kit.get("ok")  and kit.get("role")=="KITCHEN")

          tok  = owner.get("token","")
          atok = admin.get("token","")
          ktok = kit.get("token","")

          # 3. Security — unauthenticated blocks
          for action in ["getAuditLogs","updateSetting","deleteOrder","addMenuItem"]:
              r,c = post(BASE, {"action": action})
              chk(f"No-auth blocked: {action}", not r.get("ok") or c in [401,403])

          # 4. Role enforcement
          r,c = post(BASE, {"action":"updateSetting","key":"X","value":"Y","userId":"USR_002"}, token=atok)
          chk("Admin blocked: updateSetting", not r.get("ok") or c==403)
          r,c = post(BASE, {"action":"applyDiscount","orderId":"X","discountType":"PROMO","userId":"USR_004"}, token=ktok)
          chk("Kitchen blocked: applyDiscount", not r.get("ok") or c==403)
          r,c = post(BASE, {"action":"getAuditLogs","userId":"USR_002"}, token=atok)
          chk("Admin allowed: getAuditLogs", r.get("ok") or c==200)

          # 5. Order total integrity
          r,_ = post(BASE, {"action":"placeOrder","tableNo":"1","token":"b36e8426",
              "items":[{"code":"C005","qty":1,"price":139,"addons":[],"size":"","sugarLevel":""}],
              "subtotal":139,"serviceCharge":13.9,"total":152.9,"orderType":"DINE-IN"})
          oid = r.get("orderId")
          chk("placeOrder", r.get("ok"), oid)
          if oid:
              got,_ = post(BASE, {"action":"getOrders","orderId":oid}, token=tok)
              o = (got.get("orders") or [{}])[0]
              chk("total is float", isinstance(o.get("total"),(int,float)))
              chk("total = subtotal + svc", abs(o.get("total",0)-(o.get("subtotal",0)+o.get("serviceCharge",0)))<0.01)
              post(BASE, {"action":"updateOrderStatus","orderId":oid,"status":"CANCELLED","userId":"USR_001"}, token=tok)
              post(BASE, {"action":"deleteOrder","orderId":oid,"userId":"USR_001"}, token=tok)

          # 6. Tampered price rejected
          r,_ = post(BASE, {"action":"placeOrder","tableNo":"1","token":"b36e8426",
              "items":[{"code":"C005","qty":1,"price":1,"addons":[],"size":"","sugarLevel":""}],
              "subtotal":1,"serviceCharge":0.1,"total":1.1,"orderType":"DINE-IN"})
          chk("Tampered price rejected", not r.get("ok"))

          # 7. Menu
          r,_ = post(BASE, {"action":"getMenu"})
          chk("getMenu", r.get("ok") and len(r.get("items",[]))>0)

          # 8. DB integrity — no stale discounts
          # (We skip this in CI as it requires DB access — covered by nightly Edge Function)

          total  = len(results)
          passed = sum(1 for p,_ in results if p)
          failed = [l for p,l in results if not p]

          print(f"\n{'='*50}")
          print(f"  {'PASS' if not failed else 'FAIL'}  {passed}/{total}")
          print(f"{'='*50}")
          if failed:
              print("FAILURES:")
              for l in failed: print(f"  ❌ {l}")
              sys.exit(1)
          else:
              print("All checks passing — deploy is safe ✅")
          PYEOF
