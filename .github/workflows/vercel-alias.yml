name: Assign Vercel Production Alias

on:
  push:
    branches: [main]

jobs:
  assign-alias:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment and assign alias
        run: |
          echo "Waiting for Vercel to deploy..."
          sleep 60
          
          # Get the latest READY deployment
          for i in {1..10}; do
            LATEST=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&teamId=${{ secrets.VERCEL_TEAM_ID }}&limit=1&state=READY" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | python3 -c "
import json,sys
d=json.load(sys.stdin)
deps=d.get('deployments',[])
if deps: print(deps[0].get('uid',''))
" 2>/dev/null)
            
            if [ -n "$LATEST" ]; then
              echo "Found READY deployment: $LATEST"
              # Assign to production alias
              curl -s -X POST \
                "https://api.vercel.com/v2/deployments/${LATEST}/aliases?teamId=${{ secrets.VERCEL_TEAM_ID }}" \
                -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d '{"alias":"yani-garden-cafe-d3l6.vercel.app"}' | python3 -c "
import json,sys
d=json.load(sys.stdin)
print('Alias assigned:', d.get('alias','?'), 'Error:', d.get('error',{}).get('message','none'))
" 2>/dev/null
              break
            fi
            echo "Attempt $i: No READY deployment yet, waiting 15s..."
            sleep 15
          done
