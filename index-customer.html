        ) +
      '</div>' +
      '<input type="file" id="payFileInput" accept="image/jpeg,image/png" style="display:none" onchange="handlePayFile(this)">' +
    '</div>';

    // Notes
    h += '<div class="pay-form-group">' +
      '<label class="pay-form-label">Notes (Optional)</label>' +
      '<input class="pay-form-input" id="payNotes" type="text" placeholder="Reference number, bank used, etc." value="' + esc(payNotes || '') + '">' +
    '</div>';

    // Submit button
    h += '<button class="btn-primary mt-16" id="paySubmitBtn" style="width:100%" onclick="submitPaymentProof()"' + (!uploadedFile ? ' disabled style="width:100%;opacity:.5;pointer-events:none"' : '') + '>' + (state._pendingOrder ? 'Confirm & Place Order' : 'Submit Payment Proof') + '</button>';

    // Security note
    h += '<div class="pay-security">🔒 <span>Your payment details are sent directly to <span class="brand-name">Yani Garden Cafe</span>\'s secure system.</span></div>';

    return h;
  }

  window.switchPayTab = function(tab) { renderPayCenter(tab) };
  renderPayCenter('methods');
}

// ── Payment Upload State ──
var uploadedFile = null;
var uploadPreviewSrc = '';
var uploadStep = 1;
var payNotes = '';

function initUploadZone() {
  var zone = document.getElementById('uploadZone');
  if (!zone) return;

  zone.addEventListener('click', function() {
    document.getElementById('payFileInput').click();
  });

  zone.addEventListener('dragover', function(e) {
    e.preventDefault(); zone.classList.add('dragover');
  });
  zone.addEventListener('dragleave', function() {
    zone.classList.remove('dragover');
  });
  zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.classList.remove('dragover');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      processPayFile(e.dataTransfer.files[0]);
    }
  });
}

function handlePayFile(input) {
  if (input.files && input.files[0]) processPayFile(input.files[0]);
}

function processPayFile(file) {
  // Validate
  if (!file.type.match(/^image\/(jpeg|png)$/)) {
    toast('Please upload a JPG or PNG image'); return;
  }
  if (file.size > 10 * 1024 * 1024) {
    toast('File too large. Max 10MB'); return;
  }

  uploadedFile = file;
  uploadStep = 2;
  var reader = new FileReader();
  reader.onload = function(e) {
    uploadPreviewSrc = e.target.result;
    switchPayTab('upload');
  };
  reader.readAsDataURL(file);
}

function removeUpload() {
  uploadedFile = null;
  uploadPreviewSrc = '';
  uploadStep = 1;
  switchPayTab('upload');
}

function copyAcct(num, btn) {
  navigator.clipboard.writeText(num.replace(/-/g,'')).then(function() {
    var orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(function(){ btn.innerHTML = orig }, 1500);
  });
}

function togglePayAccord(id) {
  var el = document.getElementById('payAccord_' + id);
  if (!el) return;
  var wasOpen = el.classList.contains('open');
  // Close all
  document.querySelectorAll('.pay-accord').forEach(function(a) { a.classList.remove('open') });
  // Toggle clicked
  if (!wasOpen) el.classList.add('open');
}

async function submitPaymentProof() {
  var nameEl   = document.getElementById('payName');
  var amountEl = document.getElementById('payAmount');
  var notesEl  = document.getElementById('payNotes');

  // Name is required
  if (nameEl && !nameEl.value.trim()) { toast('Please enter your name'); nameEl.focus(); nameEl.style.border = '2px solid #e04444'; return; }
  if (!amountEl.value || parseFloat(amountEl.value)<=0) { toast('Please enter amount paid'); amountEl.focus(); return; }
  if (!uploadedFile)                                    { toast('Please upload your GCash screenshot'); return; }

  payNotes = notesEl ? notesEl.value : '';

  var btn = document.getElementById('paySubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Processing...';
  btn.style.opacity = '.6';

  var reader = new FileReader();
  reader.onload = async function(e) {
    var dataUrl = e.target.result;

    // ── GCash pre-order: place order first, then attach proof ──────────────
    var pending = state._pendingOrder;
    if (pending) {
      btn.textContent = 'Placing order...';
      var orderResult = await api('placeOrder', {
        tableNo:      state.tableNo,
        token:        state.tableToken,
        customerName: pending.customerName,
        orderNotes:   pending.orderNotes,
        orderType:    pending.orderType,
        subtotal:     pending.subtotal,
        serviceCharge:pending.svc,
        total:        pending.total,
        items:        pending.items,
        paymentMethod:'GCASH'
      });
      if (orderResult.timeout) {
        toast('⏱ Taking too long — please show this to staff. They will check if order went through.', 6000);
        btn.disabled = false; btn.textContent = 'Upload Screenshot';
        return;
      }
      if (!orderResult.ok) {
        toast('Order failed: ' + (orderResult.error || 'Please try again'));
        btn.disabled=false; btn.textContent='Confirm & Place Order'; btn.style.opacity='1';
        return;
      }
      state.orderId      = orderResult.orderId;
      state.orderTotal   = orderResult.total || pending.total;
      state.orderStatus  = 'NEW';
      state.paymentMethod= 'gcash';
      state._pendingOrder= null;
      btn.textContent = 'Uploading proof...';
    }
    // ── Upload proof ────────────────────────────────────────────────────────
    var ts    = new Date().toISOString().replace(/[^0-9]/g,'').slice(0,15);
    var fname = (state.orderId||(window.ORDER_PREFIX||'ORD')) + '_T' + state.tableNo + '_' + ts + '.jpg';
    var result = await api('uploadPayment', {
      orderId:      state.orderId,
      tableNo:      state.tableNo,
      customerName: nameEl.value.trim(),
      amount:       parseFloat(amountEl.value),
      notes:        payNotes,
      imageData:    dataUrl,
      filename:     fname
    });
    if (result.ok) {
      uploadStep = 3;
      showPaySuccess(result.paymentId || ('PAY-' + Date.now()));
    } else {
      toast('Upload failed: ' + (result.error || 'Please try again'));
      btn.disabled=false; btn.textContent='Submit Payment Proof'; btn.style.opacity='1';
    }
  };
  reader.readAsDataURL(uploadedFile);
}

function showPaySuccess(refId) {
  // Reset upload state
  uploadedFile = null;
  uploadPreviewSrc = '';
  payNotes = '';
  uploadStep = 1;

  // Go to receipt question — same as cash/card flow
  closePage('payment');
  openPage('receipt');
  renderReceiptPage();
}

// ══════════════════════════════════════════════════════════
// ORDER STATUS TRACKING
// ══════════════════════════════════════════════════════════
function renderStatusPage() {
  var body = document.getElementById('statusBody');
  var s = state.orderStatus.toUpperCase();

  var steps = [
    { key:'NEW', icon:'🔔', label:'Order Received', desc:'Your order has been sent to the kitchen' },
    { key:'PREPARING', icon:'👨‍🍳', label:'Preparing', desc:'Your barista is making your order' },
    { key:'READY', icon:'✨', label:'Ready', desc:state.orderType==='dine-in'?'Server is bringing your order':'Please pick up at the counter' },
    { key:'COMPLETED', icon:'🎉', label:'Completed', desc:'Thank you for visiting <span class="brand-name">Yani Garden Cafe</span>!' }
  ];

  var currentIdx = steps.findIndex(function(st) { return st.key === s });
  if (s === 'CANCELLED') currentIdx = -2;

  var html = '<div class="status-card mb-16">' +
    '<div class="status-order-id">' + esc(state.orderId) + '</div>' +
    '<div style="margin-top:8px;font-size:1.1rem;font-weight:700;color:var(--terra)">' + peso(state.orderTotal) + '</div>' +
    (state.tableNo ? '<div style="margin-top:4px;font-size:.82rem;color:var(--timber)">Table ' + esc(state.tableNo) + '</div>' : '') +
  '</div>';

  // Show payment-specific message on status page
  if (state.checkoutPayMethod === 'cash') {
    html += '<div style="background:#FFFBEB;border:1.5px solid #F59E0B;border-radius:14px;padding:16px;margin-bottom:14px;text-align:center">' +
      '<div style="font-size:1.5rem;margin-bottom:6px">☕</div>' +
      '<div style="font-size:.9rem;font-weight:700;color:#92400E;margin-bottom:4px">Your order is confirmed!</div>' +
      '<div style="font-size:.82rem;color:#78350F;line-height:1.7">' +
        'One of our team members will come to your table shortly to collect your cash payment. ' +
        'Your order will be processed right after. Thank you for dining with us!' +
      '</div>' +
    '</div>';
  } else if (state.checkoutPayMethod === 'card') {
    html += '<div style="background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:14px;padding:14px;margin-bottom:14px;text-align:center;font-size:.82rem;color:#166534;line-height:1.6">' +
      '💳 Our team will bring a card terminal to your table in just a moment.<br>Sit tight — we\'ll have you sorted in no time!' +
    '</div>';
  }

  if (s === 'CANCELLED') {
    html += '<div class="status-card"><div class="status-icon">❌</div><div class="status-title">Order Cancelled</div><div class="status-desc">Please speak with a staff member.</div></div>';
  } else {
    html += '<div style="background:var(--white);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm)">';
    html += '<div class="status-timeline">';
    steps.forEach(function(st, i) {
      var cls = '';
      if (i < currentIdx) cls = 'done';
      else if (i === currentIdx) cls = 'active';

      html += '<div class="tl-step ' + cls + '">' +
        '<div class="tl-dot">' + st.icon + '</div>' +
        '<div class="tl-info"><div class="tl-label">' + st.label + '</div><div class="tl-desc">' + st.desc + '</div></div></div>';
    });
    html += '</div></div>';
  }

  if (s === 'COMPLETED') {
    html += '<div class="text-center mt-16"><button class="btn-primary" onclick="resetOrder()">Order Again</button></div>';
  }

  body.innerHTML = html;
}

function startStatusPolling() {
  renderStatusPage();
  if (state.statusInterval) clearInterval(state.statusInterval);
  state.statusInterval = setInterval(async function() {
    var result = await api('getOrders', { orderId: state.orderId });
    if (result.ok && result.orders && result.orders.length > 0) {
      var newStatus = result.orders[0].status.toUpperCase();
      if (newStatus !== state.orderStatus) {
        state.orderStatus = newStatus;
        renderStatusPage();
        if (newStatus === 'COMPLETED' || newStatus === 'CANCELLED') {
          clearInterval(state.statusInterval);
        }
      }
    }
  }, 5000); // Poll every 5 seconds
}

function resetOrder() {
  state.cart = [];
  state.orderId = '';
  state.orderStatus = '';
  state.orderTotal = 0;
  state.paymentMethod = ''; state.checkoutPayMethod = ''; state._pendingOrder = null;
  state.receiptType = '';
  state.receiptDelivery = '';
  state.receiptEmail = '';
  state.receiptName = '';
  state.receiptAddress = '';
  state.receiptTIN = '';
  uploadedFile = null;
  if (state.statusInterval) clearInterval(state.statusInterval);
  closeAllPages();
  updateCartBar();
  renderMenu();
}

// ══════════════════════════════════════════════════════════
// PAGE MANAGEMENT
// ══════════════════════════════════════════════════════════
function openPage(name) {
  document.getElementById(name + 'Page').classList.add('open');
  if (name === 'cart') renderCartPage();
  if (name === 'checkout') renderCheckoutPage();
  if (name === 'status') renderStatusPage();
}

function closePage(name) {
  document.getElementById(name + 'Page').classList.remove('open');
}

function closeAllPages() {
  ['cart','checkout','status','receipt','payment'].forEach(function(p) { closePage(p) });
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modal on overlay click
document.getElementById('optModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('optModal');
});

</script>
