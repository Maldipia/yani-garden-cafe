name: Post-deploy smoke test

# Runs after every push to main. Waits for Vercel auto-deploy (~90s),
# then executes scripts/smoke-test.sh against production. A red status
# on a commit means a regression — investigate via the inspector URL
# or roll back via Vercel dashboard.
#
# This does NOT gate Vercel deploys (Vercel deploys are independent).
# It only surfaces regressions clearly via a GitHub status check.
#
# Replaces the previous Python audit which referenced stale auth
# constants (kitchen PIN 9012 — actual is 1122) and a deprecated
# Bearer-token model. The new smoke test is in scripts/smoke-test.sh.

on:
  push:
    branches: [main]

jobs:
  smoke:
    name: Smoke test against production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wait for Vercel deploy to go live
        run: |
          echo "Waiting 100s for Vercel auto-deploy of $GITHUB_SHA to complete..."
          sleep 100

      - name: Run smoke test against production
        env:
          BASE: https://yanigardencafe.com
        run: |
          chmod +x ./scripts/smoke-test.sh
          ./scripts/smoke-test.sh
