<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2B3F3A">
<title>My Cafe — Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   YANI GARDEN CAFE — GROUNDED ELEVATION DESIGN SYSTEM
   Rustic Zen • Highland Sanctuary • 450 MASL Amadeo
   ══════════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root {
  /* Brand Palette */
  --forest: #314C47;
  --forest-deep: #2B3F3A;
  --forest-light: #3D5E57;
  --terra: #CB694C;
  --terra-light: #E8A48E;
  --terra-glow: rgba(203,105,76,.12);
  --gold: #C0AC56;
  --gold-light: #DDD4A0;
  --mist: #C9CAC4;
  --mist-light: #E8E8E4;
  --coffee: #4A3728;
  --timber: #84592E;
  --cream: #F5F3EE;
  --parchment: #FAFAF7;
  --white: #FFFFFF;
  --overlay: rgba(43,63,58,.55);
  --danger: #B5443A;
  --success: #4A7C59;

  /* Typography */
  --font-soul: 'Crimson Pro', Georgia, 'Times New Roman', serif;
  --font-body: 'Quicksand', 'Segoe UI', system-ui, sans-serif;

  /* Spacing & Radius */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth }
body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--coffee);
  min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* Subtle background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9CAC4' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
  pointer-events: none;
  z-index: 0;
}

button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; -webkit-appearance: none }
input, textarea, select { font-family: var(--font-body); outline: none; -webkit-appearance: none }
img { max-width: 100%; display: block }
a { color: var(--terra); text-decoration: none }

/* ══════════════════════════════════════════════════════════
   HEADER
   ══════════════════════════════════════════════════════════ */
.header {
  background: linear-gradient(160deg, var(--forest-deep) 0%, var(--forest) 60%, var(--forest-light) 100%);
  color: var(--white);
  padding: 20px 20px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,.15);
}
.header::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(to right, var(--gold), var(--terra), var(--gold));
  opacity: .6;
}
.header-brand { display: flex; align-items: center; justify-content: center }
.header-logo { height: 52px; width: 52px; border-radius: 50%; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,.2) }
.header-sub { font-size: .72rem; opacity: .6; margin-top: 2px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500 }
.header-table {
  display: inline-block;
  background: var(--terra);
  color: var(--white);
  padding: 3px 14px;
  border-radius: 20px;
  font-size: .7rem;
  font-weight: 700;
  margin-top: 8px;
  letter-spacing: .5px;
}

/* ══════════════════════════════════════════════════════════
   SEARCH BAR
   ══════════════════════════════════════════════════════════ */
.search-wrap { padding: 14px 16px 6px; position: relative; z-index: 1 }
.search-input {
  width: 100%;
  padding: 11px 14px 11px 40px;
  border: 1.5px solid var(--mist);
  border-radius: var(--r-md);
  font-size: .88rem;
  background: var(--white);
  transition: border .2s, box-shadow .2s;
  color: var(--coffee);
}
.search-input:focus { border-color: var(--forest); box-shadow: 0 0 0 3px rgba(49,76,71,.1) }
.search-input::placeholder { color: var(--mist) }
.search-icon {
  position: absolute;
  left: 30px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--mist);
  font-size: 1rem;
}

/* ══════════════════════════════════════════════════════════
   CATEGORY TABS
   ══════════════════════════════════════════════════════════ */
.cats {
  display: flex;
  gap: 8px;
  padding: 8px 16px 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  position: sticky;
  top: 0;
  z-index: 90;
  background: var(--cream);
  box-shadow: 0 2px 6px rgba(0,0,0,.06);
}
.cats::-webkit-scrollbar { display: none }
.cat-tab {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 20px;
  font-size: .78rem;
  font-weight: 600;
  background: var(--white);
  color: var(--coffee);
  border: 1.5px solid var(--mist-light);
  transition: all .2s;
  letter-spacing: .3px;
}
.cat-tab.active {
  background: var(--forest);
  color: var(--white);
  border-color: var(--forest);
}

/* ══════════════════════════════════════════════════════════
   MENU GRID
   ══════════════════════════════════════════════════════════ */
.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 8px 16px 100px;
  position: relative;
  z-index: 1;
}
.menu-card {
  background: var(--white);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: transform .15s, box-shadow .15s;
  position: relative;
}
.menu-card:active { transform: scale(.97) }
.menu-sig-badge {
  position: absolute;
  top: 7px;
  left: 7px;
  background: #3B1F0A;
  color: #F5E6C8;
  font-size: .6rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 3px;
  z-index: 2;
  letter-spacing: .03em;
  white-space: nowrap;
}
.menu-img-wrap {
  width: 100%;
  aspect-ratio: 1;
  background: var(--mist-light);
  overflow: hidden;
  position: relative;
}
.menu-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity .3s;
  position: relative;
  z-index: 1;
}
.menu-img[src=""] { opacity: 0 }
.menu-img-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  color: var(--mist);
}
.menu-info { padding: 10px 10px 12px }
.menu-name {
  font-family: var(--font-soul);
  font-size: .88rem;
  font-weight: 600;
  color: var(--coffee);
  line-height: 1.2;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.menu-price {
  font-size: .82rem;
  font-weight: 700;
  color: var(--terra);
}
.menu-price-range { font-size: .68rem; color: var(--timber); font-weight: 500 }
.menu-add-btn {
  position: absolute;
  bottom: 8px;
  right: 8px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--forest);
  color: var(--white);
  font-size: 1.3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-md);
  transition: transform .15s, background .15s;
  line-height: 1;
}
.menu-add-btn:active { transform: scale(.9); background: var(--forest-light) }
.menu-badge {
  position: absolute;
  top: -6px;
  right: -6px;
  background: var(--terra);
  color: var(--white);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: .65rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}
.menu-unavailable { opacity: .45; pointer-events: none }
.menu-unavailable::after {
  content: 'Unavailable';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%) rotate(-15deg);
  background: var(--danger);
  color: var(--white);
  padding: 4px 12px;
  border-radius: 4px;
  font-size: .7rem;
  font-weight: 700;
}

/* ══════════════════════════════════════════════════════════
   CART FLOATING BAR
   ══════════════════════════════════════════════════════════ */
.cart-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  background: var(--white);
  border-top: 1px solid var(--mist-light);
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
  z-index: 90;
  display: none;
}
.cart-bar.visible { display: flex; align-items: center; gap: 12px }
.cart-bar-info { flex: 1 }
.cart-bar-count { font-size: .78rem; color: var(--timber); font-weight: 500 }
.cart-bar-total { font-size: 1.05rem; font-weight: 700; color: var(--coffee) }
.cart-bar-btn {
  background: var(--terra);
  color: var(--white);
  padding: 12px 24px;
  border-radius: var(--r-md);
  font-weight: 700;
  font-size: .88rem;
  transition: background .15s;
}
.cart-bar-btn:active { background: #b55a3f }

/* ══════════════════════════════════════════════════════════
   MODAL / OVERLAY
   ══════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto }
.modal-sheet {
  background: var(--white);
  width: 100%;
  max-width: 480px;
  max-height: 90dvh;
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.22,1,.36,1);
  -webkit-overflow-scrolling: touch;
}
.modal-overlay.open .modal-sheet { transform: translateY(0) }
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--mist);
  border-radius: 2px;
  margin: 10px auto;
}
.modal-pad { padding: 0 20px 28px }

/* ══════════════════════════════════════════════════════════
   FULL PAGE (Cart, Checkout, Status, etc.)
   ══════════════════════════════════════════════════════════ */
.page {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--cream);
  z-index: 150;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  max-width: 480px;
  margin: 0 auto;
}
.page.open { display: block }
.page-header {
  background: var(--forest);
  color: var(--white);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.page-back {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,.12);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: background .15s;
}
.page-back:active { background: rgba(255,255,255,.25) }
.page-title { font-family: var(--font-soul); font-size: 1.15rem; font-weight: 600 }
.page-body { padding: 16px 16px 40px }

/* ══════════════════════════════════════════════════════════
   CART ITEMS
   ══════════════════════════════════════════════════════════ */
.cart-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--white);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}
.cart-item-img {
  width: 56px;
  height: 56px;
  border-radius: var(--r-sm);
  object-fit: cover;
  background: var(--mist-light);
  flex-shrink: 0;
}
.cart-item-info { flex: 1; min-width: 0 }
.cart-item-name {
  font-family: var(--font-soul);
  font-size: .88rem;
  font-weight: 600;
  margin-bottom: 2px;
}
.cart-item-meta { font-size: .72rem; color: var(--timber); margin-bottom: 4px }
.cart-item-price { font-size: .85rem; font-weight: 700; color: var(--terra) }
.cart-qty {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.cart-qty button {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  font-size: 1rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.cart-qty .q-minus { background: var(--mist-light); color: var(--coffee) }
.cart-qty .q-plus { background: var(--forest); color: var(--white) }
.cart-qty .q-num { font-weight: 700; font-size: .9rem; min-width: 18px; text-align: center }
.cart-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--timber);
}
.cart-empty-icon { font-size: 3rem; margin-bottom: 12px }

/* ══════════════════════════════════════════════════════════
   OPTION SELECTORS (Size, Sugar)
   ══════════════════════════════════════════════════════════ */
.opt-header {
  text-align: center;
  padding: 16px 0 8px;
}
.opt-item-name { font-family: var(--font-soul); font-size: 1.15rem; font-weight: 700 }
.opt-item-detail { font-size: .82rem; color: var(--timber); margin-top: 2px }
.opt-label { font-weight: 700; font-size: .82rem; margin: 16px 0 10px; color: var(--forest) }
.opt-group { display: flex; flex-direction: column; gap: 8px }
.opt-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--parchment);
  border: 2px solid transparent;
  border-radius: var(--r-md);
  text-align: left;
  transition: border-color .15s, background .15s;
}
.opt-btn.selected {
  border-color: var(--forest);
  background: rgba(49,76,71,.06);
}
/* ── SIZE color coding ─────────── */
.opt-btn.size-short.selected  { border-color: #6baed6; background: rgba(107,174,214,.08); }
.opt-btn.size-short.selected .opt-btn-radio { border-color: #6baed6; }
.opt-btn.size-short.selected .opt-btn-radio::after { background: #6baed6; }
.opt-btn.size-short.selected .opt-btn-main { color: #2c6e9e; }

.opt-btn.size-medium.selected { border-color: #4a9960; background: rgba(74,153,96,.08); }
.opt-btn.size-medium.selected .opt-btn-radio { border-color: #4a9960; }
.opt-btn.size-medium.selected .opt-btn-radio::after { background: #4a9960; }
.opt-btn.size-medium.selected .opt-btn-main { color: #2d6a3f; }

.opt-btn.size-tall.selected   { border-color: #1a3a2a; background: rgba(26,58,42,.10); }
.opt-btn.size-tall.selected   { border-color: #065f46; background: rgba(6,95,70,.08); }
.opt-btn.size-tall.selected .opt-btn-radio { border-color: #065f46; }
.opt-btn.size-tall.selected .opt-btn-radio::after { background: #065f46; }
.opt-btn.size-tall.selected .opt-btn-main { color: #065f46; }

/* ── SUGAR level color coding ─── */
.opt-btn.sugar-grounded.selected { border-color: #74c476; background: rgba(116,196,118,.08); }
.opt-btn.sugar-grounded.selected .opt-btn-radio { border-color: #74c476; }
.opt-btn.sugar-grounded.selected .opt-btn-radio::after { background: #74c476; }
.opt-btn.sugar-grounded.selected .opt-btn-main { color: #2d6a3f; }

.opt-btn.sugar-yani.selected    { border-color: #c8873a; background: rgba(200,135,58,.08); }
.opt-btn.sugar-yani.selected .opt-btn-radio { border-color: #c8873a; }
.opt-btn.sugar-yani.selected .opt-btn-radio::after { background: #c8873a; }
.opt-btn.sugar-yani.selected .opt-btn-main { color: #8a5220; }

.opt-btn.sugar-comfort.selected  { border-color: #e8953a; background: rgba(232,149,58,.08); }
.opt-btn.sugar-comfort.selected .opt-btn-radio { border-color: #e8953a; }
.opt-btn.sugar-comfort.selected .opt-btn-radio::after { background: #e8953a; }
.opt-btn.sugar-comfort.selected .opt-btn-main { color: #b85a10; }

.opt-btn.sugar-full.selected     { border-color: #e05252; background: rgba(224,82,82,.08); }
.opt-btn.sugar-full.selected .opt-btn-radio { border-color: #e05252; }
.opt-btn.sugar-full.selected .opt-btn-radio::after { background: #e05252; }
.opt-btn.sugar-full.selected .opt-btn-main { color: #b91c1c; }

/* Size pill indicators */
.size-pip { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; vertical-align:middle; flex-shrink:0; }
.size-pip.short  { background:#6baed6; }
.size-pip.medium { background:#4a9960; }
.size-pip.tall   { background:#065f46; }

/* Sugar gradient bar */
.sugar-bar { display:inline-block; width:14px; height:14px; border-radius:3px; margin-right:6px; vertical-align:middle; flex-shrink:0; }
.sugar-bar.grounded { background:#74c476; }
.sugar-bar.yani     { background:#c8873a; }
.sugar-bar.comfort  { background:#e8953a; }
.sugar-bar.full     { background:#e05252; }
.opt-btn-radio {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--mist);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color .15s;
}
.opt-btn.selected .opt-btn-radio {
  border-color: var(--forest);
}
.opt-btn.selected .opt-btn-radio::after {
  content: '';
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--forest);
}
.opt-btn-text { flex: 1 }
.opt-btn-main { font-weight: 600; font-size: .88rem }
.opt-btn-sub { font-size: .72rem; color: var(--timber); margin-top: 1px }
.opt-btn-price { font-weight: 700; color: var(--terra); font-size: .88rem }
.opt-btn-default {
  font-size: .6rem;
  background: var(--gold-light);
  color: var(--timber);
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  margin-left: 6px;
}
.opt-confirm {
  width: 100%;
  padding: 14px;
  border-radius: var(--r-md);
  background: var(--forest);
  color: var(--white);
  font-size: .95rem;
  font-weight: 700;
  margin-top: 20px;
  transition: background .15s;
}
.opt-confirm:active { background: var(--forest-light) }

/* ══════════════════════════════════════════════════════════
   CHECKOUT & FORMS
   ══════════════════════════════════════════════════════════ */
.form-group { margin-bottom: 16px }
.form-label {
  display: block;
  font-size: .78rem;
  font-weight: 600;
  color: var(--forest);
  margin-bottom: 6px;
}
.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--mist);
  border-radius: var(--r-sm);
  font-size: .88rem;
  background: var(--white);
  color: var(--coffee);
  transition: border .2s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--forest) }
.form-textarea { resize: vertical; min-height: 70px }

.order-type-group { display: flex; gap: 10px; margin-bottom: 16px }
.order-type-btn {
  flex: 1;
  padding: 14px;
  border-radius: var(--r-md);
  border: 2px solid var(--mist);
  text-align: center;
  transition: all .15s;
  background: var(--white);
}
.order-type-btn.active { border-color: var(--forest); background: rgba(49,76,71,.06) }
.order-type-btn.dine-in-btn.active { border-color: var(--forest); background: rgba(26,58,42,.08) }
.order-type-btn.dine-in-btn.active .ot-label { color: var(--forest) }
.order-type-btn.take-out-btn.active { border-color: #c2550a; background: rgba(194,85,10,.07) }
.order-type-btn.take-out-btn.active .ot-icon { filter: none }
.order-type-btn.take-out-btn.active .ot-label { color: #c2550a }
.order-type-btn.take-out-btn.active .ot-sub { color: #c2550a }
.order-type-btn .ot-icon { font-size: 1.3rem; margin-bottom: 4px }
.order-type-btn .ot-label { font-weight: 700; font-size: .82rem }
.order-type-btn .ot-sub { font-size: .68rem; color: var(--timber); margin-top: 2px }

.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: .88rem;
}
.summary-row.total {
  border-top: 2px solid var(--forest);
  margin-top: 8px;
  padding-top: 10px;
  font-size: 1.1rem;
  font-weight: 700;
}
.summary-row.total .sr-val { color: var(--terra) }

.btn-primary {
  width: 100%;
  padding: 14px;
  border-radius: var(--r-md);
  background: var(--terra);
  color: var(--white);
  font-size: .95rem;
  font-weight: 700;
  transition: background .15s;
  letter-spacing: .3px;
}
.btn-primary:active { background: #b55a3f }
.btn-primary:disabled { opacity: .5; pointer-events: none }
.btn-secondary {
  width: 100%;
  padding: 12px;
  border-radius: var(--r-md);
  background: var(--mist-light);
  color: var(--coffee);
  font-size: .88rem;
  font-weight: 600;
  transition: background .15s;
}

/* ══════════════════════════════════════════════════════════
   STATUS PAGE
   ══════════════════════════════════════════════════════════ */
.status-card {
  background: var(--white);
  border-radius: var(--r-lg);
  padding: 24px 20px;
  box-shadow: var(--shadow-md);
  text-align: center;
  margin-bottom: 16px;
}
.status-icon { font-size: 3rem; margin-bottom: 8px }
.status-title { font-family: var(--font-soul); font-size: 1.2rem; font-weight: 700; margin-bottom: 4px }
.status-desc { font-size: .82rem; color: var(--timber); margin-bottom: 16px }
.status-order-id {
  display: inline-block;
  background: var(--forest);
  color: var(--white);
  padding: 6px 18px;
  border-radius: 20px;
  font-weight: 700;
  font-size: .85rem;
  letter-spacing: .5px;
}
.status-timeline { padding: 20px 0 }
.tl-step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding-bottom: 20px;
  position: relative;
}
.tl-step:last-child { padding-bottom: 0 }
.tl-step::before {
  content: '';
  position: absolute;
  left: 15px;
  top: 32px;
  bottom: 0;
  width: 2px;
  background: var(--mist-light);
}
.tl-step:last-child::before { display: none }
.tl-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--mist-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .85rem;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.tl-step.active .tl-dot { background: var(--forest); color: var(--white) }
.tl-step.done .tl-dot { background: var(--success); color: var(--white) }
.tl-step.active .tl-dot { animation: pulse 1.5s ease infinite }
.tl-info { padding-top: 4px }
.tl-label { font-weight: 700; font-size: .85rem }
.tl-desc { font-size: .72rem; color: var(--timber); margin-top: 1px }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(49,76,71,.3) }
  50% { box-shadow: 0 0 0 8px rgba(49,76,71,0) }
}

/* ══════════════════════════════════════════════════════════
   PAYMENT OPTIONS
   ══════════════════════════════════════════════════════════ */
.pay-method-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: var(--white);
  border-radius: var(--r-md);
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  border: 2px solid transparent;
  transition: all .15s;
  width: 100%;
}
.pay-method-btn:active { border-color: var(--forest); background: rgba(49,76,71,.04) }
.pay-method-icon { font-size: 1.5rem; flex-shrink: 0 }
.pay-method-info { flex: 1; text-align: left }
.pay-method-name { font-weight: 700; font-size: .9rem }
.pay-method-desc { font-size: .72rem; color: var(--timber); margin-top: 1px }

/* ── Payment Center: Two-Tab Layout ── */
.pay-tabs { display:flex; gap:0; margin-bottom:20px; border-radius:var(--r-md); overflow:hidden; border:2px solid var(--forest) }
.pay-tab {
  flex:1; padding:12px 8px; text-align:center; font-size:.82rem; font-weight:700;
  background:var(--white); color:var(--forest); cursor:pointer; transition:all .15s;
  border:none; font-family:var(--font-soul);
}
.pay-tab.active { background:var(--forest); color:var(--white) }
.pay-tab:not(.active):hover { background:rgba(49,76,71,.06) }

.pay-section-title {
  font-family:var(--font-soul); font-size:.9rem; font-weight:700;
  color:var(--coffee); margin:20px 0 10px; padding-bottom:6px;
  border-bottom:1px solid var(--mist-light);
}
.pay-section-title:first-child { margin-top:0 }

/* Payment account card */
.pay-card {
  background:var(--white); border-radius:var(--r-lg); padding:16px;
  box-shadow:var(--shadow-sm); margin-bottom:12px; text-align:center;
}
.pay-card-header {
  display:flex; align-items:center; gap:10px; margin-bottom:12px;
  padding-bottom:10px; border-bottom:1px solid var(--mist-light);
}
.pay-card-badge {
  width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:1.1rem; font-weight:700; flex-shrink:0;
}
.pay-card-badge.gcash { background:#00b900; color:#fff }
.pay-card-badge.bdo { background:#003d7a; color:#fff }
.pay-card-badge.bpi { background:#c4161c; color:#fff }
.pay-card-badge.union { background:#f47920; color:#fff }
.pay-card-badge.instapay { background:#1a3c6e; color:#fff }
.pay-card-label { text-align:left }
.pay-card-label strong { display:block; font-size:.88rem }
.pay-card-label span { font-size:.72rem; color:var(--timber) }
.pay-card-qr { margin:0 auto 10px; max-width:220px }
.pay-card-qr img { width:100%; border-radius:var(--r-sm) }
.pay-card-acct { font-size:.78rem; color:var(--timber); margin-top:6px }
.pay-card-acct strong { color:var(--coffee); font-size:.84rem; display:block; margin-bottom:2px }
.pay-card-copy {
  display:inline-flex; align-items:center; gap:4px; padding:4px 10px;
  border-radius:var(--r-sm); background:var(--mist-light); font-size:.72rem;
  color:var(--forest); font-weight:600; cursor:pointer; margin-top:6px; border:none;
}
.pay-card-copy:active { background:var(--forest); color:#fff }

/* Payment Accordion */
.pay-accord { background:var(--white); border-radius:var(--r-lg); margin-bottom:10px; box-shadow:var(--shadow-sm); overflow:hidden; cursor:pointer }
.pay-accord-header { display:flex; align-items:center; gap:10px; padding:14px 16px }
.pay-accord-info { flex:1 }
.pay-accord-info strong { display:block; font-size:.88rem }
.pay-accord-info span { font-size:.72rem; color:var(--timber) }
.pay-accord-arrow { font-size:.8rem; color:var(--timber); transition:transform .2s }
.pay-accord.open .pay-accord-arrow { transform:rotate(180deg) }
.pay-accord-body { display:none; padding:0 16px 16px; cursor:default }
.pay-accord.open .pay-accord-body { display:block }

/* CTA banner at bottom of Tab 1 */
.pay-cta-banner {
  background:linear-gradient(135deg,var(--forest),#2d5a50); color:#fff;
  border-radius:var(--r-md); padding:16px; text-align:center;
  margin-top:20px; cursor:pointer;
}
.pay-cta-banner strong { display:block; font-size:.92rem; margin-bottom:2px }
.pay-cta-banner span { font-size:.75rem; opacity:.85 }

/* ── Upload Proof Tab ── */
.pay-progress {
  display:flex; align-items:center; justify-content:center; gap:0;
  margin-bottom:20px; font-size:.72rem; color:var(--timber);
}
.pay-progress-step {
  display:flex; align-items:center; gap:4px; font-weight:600;
}
.pay-progress-step.active { color:var(--forest) }
.pay-progress-step.done { color:var(--success) }
.pay-progress-line { width:24px; height:2px; background:var(--mist); margin:0 6px }
.pay-progress-line.done { background:var(--success) }
.pay-progress-num {
  width:20px; height:20px; border-radius:50%; display:inline-flex;
  align-items:center; justify-content:center; font-size:.68rem;
  background:var(--mist-light); color:var(--timber); font-weight:700;
}
.pay-progress-step.active .pay-progress-num { background:var(--forest); color:#fff }
.pay-progress-step.done .pay-progress-num { background:var(--success); color:#fff }

.pay-form-group { margin-bottom:14px }
.pay-form-label {
  display:block; font-size:.78rem; font-weight:600; color:var(--coffee);
  margin-bottom:4px; font-family:var(--font-soul);
}
.pay-form-label .req { color:var(--terra) }
.pay-form-input {
  width:100%; padding:10px 12px; border:1.5px solid var(--mist);
  border-radius:var(--r-sm); font-size:.88rem; background:var(--white);
  color:var(--coffee); font-family:var(--font-body); transition:border-color .15s;
}
.pay-form-input:focus { border-color:var(--forest); outline:none }
.pay-form-input[readonly] { background:var(--mist-light); color:var(--timber) }
.pay-form-input::placeholder { color:var(--mist) }
.pay-form-hint { font-size:.68rem; color:var(--timber); margin-top:2px }

/* Upload drop zone */
.upload-zone {
  border:2px dashed var(--mist); border-radius:var(--r-md);
  padding:32px 16px; text-align:center; cursor:pointer; transition:all .2s;
  position:relative;
}
.upload-zone:hover, .upload-zone.dragover { border-color:var(--forest); background:rgba(49,76,71,.03) }
.upload-zone.has-file { border-style:solid; border-color:var(--success); background:rgba(76,175,80,.04) }
.upload-zone-icon { font-size:2.2rem; margin-bottom:6px }
.upload-zone-text { font-size:.82rem; color:var(--timber) }
.upload-zone-text strong { color:var(--forest) }
.upload-zone-hint { font-size:.68rem; color:var(--mist); margin-top:4px }
.upload-zone-preview {
  position:relative; display:inline-block; margin-top:10px;
}
.upload-zone-preview img { max-width:180px; max-height:180px; border-radius:var(--r-sm); box-shadow:var(--shadow-sm) }
.upload-zone-remove {
  position:absolute; top:-8px; right:-8px; width:24px; height:24px;
  border-radius:50%; background:var(--terra); color:#fff; border:2px solid #fff;
  font-size:.72rem; font-weight:700; cursor:pointer; display:flex;
  align-items:center; justify-content:center; box-shadow:var(--shadow-sm);
}

/* Payment success screen */
.pay-success { text-align:center; padding:20px 0 }
.pay-success-icon { font-size:3rem; margin-bottom:10px }
.pay-success-title { font-family:var(--font-soul); font-size:1.2rem; font-weight:700; color:var(--forest); margin-bottom:4px }
.pay-success-desc { font-size:.82rem; color:var(--timber); margin-bottom:16px }
.pay-success-ref {
  display:inline-block; background:var(--mist-light); padding:8px 20px;
  border-radius:var(--r-sm); font-weight:700; font-size:.88rem; color:var(--coffee); margin-bottom:16px;
}
.pay-success-detail { font-size:.78rem; color:var(--timber); margin:3px 0 }

.pay-security {
  display:flex; align-items:center; gap:6px; justify-content:center;
  margin-top:16px; font-size:.72rem; color:var(--mist);
}

/* Receipt options */
.receipt-option {
  padding: 16px;
  background: var(--white);
  border-radius: var(--r-md);
  border: 2px solid transparent;
  margin-bottom: 10px;
  transition: all .15s;
  cursor: pointer;
}
.receipt-option.selected { border-color: var(--forest); background: rgba(49,76,71,.04) }
.receipt-option h4 { font-size: .88rem; margin-bottom: 2px }
.receipt-option p { font-size: .72rem; color: var(--timber) }

/* ══════════════════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════════════════ */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translate(-50%, -20px);
  background: var(--forest);
  color: var(--white);
  padding: 10px 20px;
  border-radius: var(--r-md);
  font-size: .82rem;
  font-weight: 600;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: all .3s;
  text-align: center;
  max-width: 320px;
}
.toast.show { opacity: 1; transform: translate(-50%, 0) }

/* ══════════════════════════════════════════════════════════
   LOADING SPINNER
   ══════════════════════════════════════════════════════════ */
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--mist-light);
  border-top-color: var(--forest);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg) } }
.loading-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 50vh;
  gap: 16px;
  color: var(--timber);
  font-size: .88rem;
}
.loading-page .spinner { width: 40px; height: 40px }

/* ══════════════════════════════════════════════════════════
   DIVIDERS & MISC
   ══════════════════════════════════════════════════════════ */
.divider { height: 1px; background: var(--mist-light); margin: 16px 0 }
.text-center { text-align: center }
.mb-8 { margin-bottom: 8px }
.mb-12 { margin-bottom: 12px }
.mb-16 { margin-bottom: 16px }
.mb-20 { margin-bottom: 20px }
.mt-16 { margin-top: 16px }
.sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0) }

/* ══════════════════════════════════════════════════════════
   YANI INTRO SPLASH
   ══════════════════════════════════════════════════════════ */
#yaniSplash {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #111e14;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 28px;
  overflow-y: auto;
  overflow-x: hidden;
  transition: opacity .6s ease;
}
#yaniSplash.fade-out {
  opacity: 0;
  pointer-events: none;
}
/* Background — optional uploaded image + dark overlay + blur */
#yaniSplash .splash-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
#yaniSplash .splash-bg-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(6px) brightness(.35) saturate(.8);
  transform: scale(1.06); /* avoid blur edge artifacts */
  display: none;
}
#yaniSplash .splash-bg-img.loaded { display: block; }
#yaniSplash .splash-bg-glow {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(200,135,58,.10) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 85% 90%, rgba(74,153,96,.08) 0%, transparent 70%);
}
/* Inner content card — max width keeps it tight on wide screens */
#yaniSplash .splash-inner {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 360px;
  padding: 48px 0 52px;
  text-align: center;
}
/* Logo */
#yaniSplash .splash-logo {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(200,135,58,.45);
  box-shadow: 0 0 28px rgba(200,135,58,.18), 0 2px 12px rgba(0,0,0,.4);
  margin-bottom: 20px;
  animation: splashFadeUp .7s ease both;
}
/* Cafe name */
#yaniSplash .splash-name {
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #c8873a;
  margin-bottom: 20px;
  animation: splashFadeUp .8s ease .08s both;
}
/* Gold divider */
#yaniSplash .splash-rule {
  width: 36px;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(200,135,58,.7), transparent);
  margin: 0 auto 28px;
  animation: splashFadeUp .8s ease .12s both;
}
/* Story block */
#yaniSplash .splash-story {
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 1.1rem;
  line-height: 1.9;
  color: rgba(245,240,232,.78);
  animation: splashFadeUp .9s ease .22s both;
  width: 100%;
}
/* Each paragraph gets breathing room */
#yaniSplash .splash-story p {
  margin: 0 0 16px 0;
  padding: 0;
}
#yaniSplash .splash-story p:last-child {
  margin-bottom: 0;
}
/* Tagline — softer, italic */
#yaniSplash .splash-tagline {
  margin-top: 24px;
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: .95rem;
  font-style: italic;
  color: rgba(245,240,232,.45);
  letter-spacing: .3px;
  animation: splashFadeUp .9s ease .32s both;
}
/* Guide tip — subtle pill */
#yaniSplash .splash-guide {
  margin-top: 22px;
  padding: 10px 16px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 10px;
  font-family: 'Quicksand', sans-serif;
  font-size: .75rem;
  font-weight: 500;
  color: rgba(245,240,232,.38);
  line-height: 1.6;
  animation: splashFadeUp .9s ease .38s both;
  display: none; /* shown via JS only if guide text exists */
}
/* CTA button */
#yaniSplash .splash-btn {
  margin-top: 36px;
  padding: 13px 40px;
  background: transparent;
  border: 1.5px solid rgba(200,135,58,.55);
  border-radius: 40px;
  color: #e8c98a;
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .2s;
  animation: splashFadeUp .9s ease .55s both;
}
#yaniSplash .splash-btn:hover,
#yaniSplash .splash-btn:active {
  background: rgba(200,135,58,.14);
  border-color: #c8873a;
  color: #fff;
}
/* Skip — tiny top-right */
#yaniSplash .splash-skip {
  position: fixed;
  top: 16px;
  right: 18px;
  font-family: 'Quicksand', sans-serif;
  font-size: .68rem;
  font-weight: 600;
  color: rgba(245,240,232,.22);
  cursor: pointer;
  letter-spacing: .8px;
  text-transform: uppercase;
  padding: 6px 8px;
  transition: color .2s;
  z-index: 2;
}
#yaniSplash .splash-skip:hover { color: rgba(245,240,232,.55); }
@keyframes splashFadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- ═══════════════════ YANI INTRO SPLASH ═══════════════════ -->
<div id="yaniSplash">
  <div class="splash-bg">
    <img class="splash-bg-img" id="splashBgImg" src="" alt="" onload="this.classList.add('loaded')">
    <div class="splash-bg-glow"></div>
  </div>
  <button class="splash-skip" onclick="dismissSplash()">Skip</button>
  <div class="splash-inner">
    <img class="splash-logo" src="/images/logo.png" alt="YANI" onerror="this.style.display='none'">
    <div class="splash-name" id="splashTitle">Yani Garden Cafe</div>
    <div class="splash-rule"></div>
    <div class="splash-story" id="splashStoryText"></div>
    <div class="splash-tagline" id="splashTagline"></div>
    <div class="splash-guide" id="splashGuideWrap">
      <span id="splashGuideText"></span>
    </div>
    <button class="splash-btn" id="splashBtn" onclick="dismissSplash()">See Our Menu →</button>
  </div>
</div>

<!-- ═══════════════════ HEADER ═══════════════════ -->
<div class="header">
  <div class="header-brand"><img class="header-logo" src="/images/logo.png" alt="<span class="brand-name">Yani Garden Cafe</span>"></div>
  <div class="header-sub">Highland Sanctuary • Amadeo</div>
  <div class="header-table" id="headerTable">Table —</div>
</div>

<!-- ═══════════════════ SEARCH ═══════════════════ -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" class="search-input" id="searchInput" placeholder="Search menu..." oninput="filterMenu()">
</div>

<!-- ═══════════════════ CATEGORIES ═══════════════════ -->
<div class="cats" id="catTabs"></div>

<!-- ═══════════════════ MENU GRID ═══════════════════ -->
<div class="menu-grid" id="menuGrid"></div>

<!-- ═══════════════════ EMPTY STATE ═══════════════════ -->
<div id="emptyState" style="display:none;text-align:center;padding:60px 20px;position:relative;z-index:1">
  <div style="font-size:2.5rem;margin-bottom:8px">🍃</div>
  <div style="font-size:.9rem;color:var(--timber)">No items found</div>
</div>

<!-- ═══════════════════ CART FLOATING BAR ═══════════════════ -->
<div class="cart-bar" id="cartBar">
  <div class="cart-bar-info">
    <div class="cart-bar-count" id="cartCount">0 items</div>
    <div class="cart-bar-total" id="cartTotal">₱0</div>
  </div>
  <button class="cart-bar-btn" onclick="openPage('cart')">View Cart →</button>
</div>

<!-- ═══════════════════ TOAST ═══════════════════ -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════ SIZE/SUGAR MODAL ═══════════════════ -->
<div class="modal-overlay" id="optModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-pad" id="optContent"></div>
  </div>
</div>

<!-- ═══════════════════ CART PAGE ═══════════════════ -->
<div class="page" id="cartPage">
  <div class="page-header">
    <button class="page-back" onclick="closePage('cart')">←</button>
    <div class="page-title">Your Cart</div>
  </div>

      tall:   parseFloat(item.priceTall)   || parseFloat(item.price) || 0

    code:      item.code,

    category:  item.category,
    price:     parseFloat(item.price) || 0,
    hasSizes:  !!item.hasSizes,
    hasSugar:  !!item.hasSugar,
    sizes:     sizes,
    available:   item.available !== false, // default true

    img:         img

}

function updateStickyOffsets() {

    var hh = header.getBoundingClientRect().height;

// ── SPLASH SCREEN ───────────────────────────────────────
function dismissSplash() {
  var splash = document.getElementById('yaniSplash');
  if (!splash) return;
  splash.classList.add('fade-out');
  setTimeout(function() {
    splash.style.display = 'none';
  }, 700);
  // Remember for this session — won't show again on refresh
  try { sessionStorage.setItem('yani_intro_seen', '1'); } catch(e) {}
}

function initSplash() {
  // Skip if already seen this session (e.g. page refresh)
  var seen = false;
  try { seen = sessionStorage.getItem('yani_intro_seen') === '1'; } catch(e) {}
  if (seen) {
    var splash = document.getElementById('yaniSplash');
    if (splash) splash.style.display = 'none';
    return;
  }
  // Apply welcome content from APP_CONFIG (loaded by loadAppConfig on startup —
  // no extra fetch needed, uses /api/config which is already cached)
  function _applySplashConfig(cfg) {
    if (!cfg) return;
    if (cfg.WELCOME_ENABLED === 'false') {
      var el = document.getElementById('yaniSplash');
      if (el) el.style.display = 'none';
      return;
    }
    var titleEl = document.getElementById('splashTitle');
    if (titleEl && cfg.WELCOME_TITLE) titleEl.textContent = cfg.WELCOME_TITLE;
    // Render story: split on double-newline for paragraphs,
    // single newline becomes <br> within a paragraph
    var storyEl = document.getElementById('splashStoryText');
    if (storyEl && cfg.WELCOME_STORY) {
      var paras = cfg.WELCOME_STORY.split(/\n\n+/);
      storyEl.innerHTML = paras.map(function(p) {
        return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }
    var tagEl = document.getElementById('splashTagline');
    if (tagEl && cfg.WELCOME_TAGLINE) tagEl.textContent = cfg.WELCOME_TAGLINE;
    var guideWrap = document.getElementById('splashGuideWrap');
    var guideEl   = document.getElementById('splashGuideText');
    if (guideEl && cfg.WELCOME_GUIDE) {
      guideEl.textContent = cfg.WELCOME_GUIDE;
      if (guideWrap) guideWrap.style.display = 'block';
    }
    var btnEl = document.getElementById('splashBtn');
    if (btnEl && cfg.WELCOME_BUTTON) btnEl.textContent = cfg.WELCOME_BUTTON;
    // Background image
    if (cfg.WELCOME_BG_URL) {
      var bgImg = document.getElementById('splashBgImg');
      if (bgImg) bgImg.src = cfg.WELCOME_BG_URL;
    }
    var secs = parseInt(cfg.WELCOME_AUTO_SECONDS || '0', 10);
    if (secs > 0) setTimeout(function(){ dismissSplash(); }, secs * 1000);
  }

  // APP_CONFIG is set by loadAppConfig() which runs at DOMContentLoaded.
  // Since loadAppConfig fires first and /api/config is fast (5-min cache),
  // APP_CONFIG is ready by the time the user reads the splash.
  // Poll briefly in case config hasn't loaded yet (cold start race).
  var _attempts = 0;
  function _waitAndApply() {
    if (APP_CONFIG && APP_CONFIG.WELCOME_TITLE) {
      _applySplashConfig(APP_CONFIG);
    } else if (_attempts < 20) {
      _attempts++;
      setTimeout(_waitAndApply, 100); // retry every 100ms up to 2s
    }
    // After 2s give up — hardcoded HTML fallback shows as-is
  }
  _waitAndApply();
}

window.addEventListener('DOMContentLoaded', async function() {
  initSplash();
  updateStickyOffsets();
  window.addEventListener('resize', updateStickyOffsets);
  // Parse URL params first
  var params = new URLSearchParams(window.location.search);
  state.tableNo = params.get('table') || '';
  state.token = params.get('token') || '';

  // Refresh table tokens from DB (handles added/changed tables dynamically)
  await initTableTokens();

  // Validate table token
  if (state.tableNo && TABLE_TOKENS[state.tableNo]) {
    if (state.token !== TABLE_TOKENS[state.tableNo]) {
      document.getElementById('headerTable').textContent = '⚠️ Invalid Table';
      toast('Invalid table QR code. Please scan again.');
      return;
    }
    document.getElementById('headerTable').textContent = 'Table ' + state.tableNo;
  } else if (state.tableNo) {
    // Table not found in DB — show warning but allow ordering (graceful degradation)
    document.getElementById('headerTable').textContent = 'Table ' + state.tableNo;
    console.warn('Table ' + state.tableNo + ' not found in token map');
  } else {
    document.getElementById('headerTable').textContent = 'Walk-in Order';
  }

  // Show loading spinner while fetching live menu
  showMenuLoading();
  fetchMenuFromAPI();
});

function showMenuLoading() {
  document.getElementById('catTabs').innerHTML = '';
  document.getElementById('menuGrid').innerHTML =
    '<div class="loading-page" style="grid-column:1/-1">' +
    '<div class="spinner"></div>' +
    '<div>Loading menu…</div>' +
    '</div>';
  document.getElementById('emptyState').style.display = 'none';
}

async function fetchMenuFromAPI() {
  try {
    var [menuResult, addonsResult] = await Promise.all([
      api('getMenu', {}),
      api('getAddons', {})
    ]);
    if (menuResult && menuResult.ok && Array.isArray(menuResult.items) && menuResult.items.length > 0) {
      MENU_DATA = menuResult.items.map(apiItemToMenuData);
    } else {
      console.warn('Menu API failed, using fallback:', menuResult && menuResult.error);
      MENU_DATA = MENU_DATA_FALLBACK.slice();
      toast('Menu loaded from cache. Prices may vary.', 4000);
    }
    if (addonsResult && addonsResult.ok) {
      ADDONS_DATA = addonsResult.addons || [];
    }
  } catch (e) {
    console.error('fetchMenuFromAPI error:', e);
    MENU_DATA = MENU_DATA_FALLBACK.slice();
    toast('Offline mode — prices may vary.', 4000);
  }
  renderCategories();
  renderMenu();
}

// ══════════════════════════════════════════════════════════
// UTILITY
// ══════════════════════════════════════════════════════════
function esc(s) { var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML }
function peso(n) { return '₱' + Number(n).toLocaleString('en-PH', {minimumFractionDigits:0, maximumFractionDigits:2}) }

function toast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.classList.remove('show') }, dur || 2500);
}

function getImgUrl(item) {
  // Always use local Vercel-hosted image path (fast CDN, not Google Drive)
  return item.img || getLocalImgPath(item.code);
}

function getCategoryIcon(cat) {
  var icons = { 'HOT':'☕', 'ICE AND ICE BLENDED':'🧊', 'PASTRY':'🥐', 'PASTA':'🍝', 'WRAP':'🌯', 'OTHER':'🍽️', 'BEST WITH':'🍱' };
  return icons[cat] || '🍃';
}

// ══════════════════════════════════════════════════════════
// API (via Vercel proxy → Apps Script)
// ══════════════════════════════════════════════════════════
async function api(action, data) {
  try {
    var body = Object.assign({ action: action }, data || {});
    if (!body.tableNo) body.tableNo = state.tableNo || '1';
    if (!body.token) body.token = state.token || '';

    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, 30000);

    var resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    return await resp.json();
  } catch(e) {
    console.error('API error:', action, e);
    if (e.name === 'AbortError') {
      return { ok: false, error: 'Request timed out. If placing an order, check with staff — it may have gone through.', timeout: true };
    }
    return { ok: false, error: e.message || 'Network error — please check your connection and try again.' };
  }
}

// ══════════════════════════════════════════════════════════
// CATEGORY TABS
// ══════════════════════════════════════════════════════════
function renderCategories() {
  var cats = ['ALL'];
  MENU_DATA.forEach(function(item) {
    if (cats.indexOf(item.category) === -1) cats.push(item.category);
  });

  var html = cats.map(function(c) {
    var active = c === state.activeCategory ? ' active' : '';
    var icon = c === 'ALL' ? '🍃' : getCategoryIcon(c);
    return '<button class="cat-tab' + active + '" onclick="setCategory(\'' + esc(c) + '\')">' + icon + ' ' + esc(c) + '</button>';
  }).join('');

  document.getElementById('catTabs').innerHTML = html;
}

function setCategory(cat) {
  state.activeCategory = cat;
  renderCategories();
  renderMenu();
}

// ══════════════════════════════════════════════════════════
// MENU RENDERING
// ══════════════════════════════════════════════════════════
function renderMenu() {
  var items = MENU_DATA.filter(function(item) {
    var matchCat = state.activeCategory === 'ALL' || item.category === state.activeCategory;
    var matchSearch = !state.search || item.name.toLowerCase().indexOf(state.search.toLowerCase()) > -1;
    return matchCat && matchSearch;
  });

  var grid = document.getElementById('menuGrid');
  var empty = document.getElementById('emptyState');

  if (items.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = items.map(function(item) {
    var imgUrl = getImgUrl(item);
    var unavail = item.available ? '' : ' menu-unavailable';
    var cartQty = getCartQty(item.code);
    var badge = cartQty > 0 ? '<span class="menu-badge">' + cartQty + '</span>' : '';
    var priceStr = '';
    if (item.hasSizes && item.sizes) {
      priceStr = '<span class="menu-price">' + peso(item.sizes.short) + '</span> <span class="menu-price-range">- ' + peso(item.sizes.tall) + '</span>';
    } else {
      priceStr = '<span class="menu-price">' + peso(item.price) + '</span>';
    }

    return '<div class="menu-card' + unavail + '">' +
      '<div class="menu-img-wrap">' +
        (imgUrl ? '<img class="menu-img" src="' + imgUrl + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '') +
        '<div class="menu-img-placeholder">' + getCategoryIcon(item.category) + '</div>' +
        (item.isSignature ? '<div class="menu-sig-badge"><span>★</span> Yani\'s Signature</div>' : '') +
      '</div>' +
      '<div class="menu-info">' +
        '<div class="menu-name">' + esc(item.name) + '</div>' +
        '<div>' + priceStr + '</div>' +
      '</div>' +
      '<button class="menu-add-btn" onclick="addItem(\'' + item.code + '\')" aria-label="Add ' + esc(item.name) + '">' +
        badge + '+' +
      '</button>' +
    '</div>';
  }).join('');
}

function filterMenu() {
  state.search = document.getElementById('searchInput').value;
  renderMenu();
}

function getCartQty(code) {
  var total = 0;
  state.cart.forEach(function(c) { if (c.code === code) total += c.qty });
  return total;
}

// ══════════════════════════════════════════════════════════
// ADD ITEM — Size & Sugar Selection
// ══════════════════════════════════════════════════════════
function addItem(code) {
  var item = MENU_DATA.find(function(m) { return m.code === code });
  if (!item || !item.available) return;

  // Re-fetch addons if none loaded yet (handles case where addon was created after page load)
  if (ADDONS_DATA.length === 0) {
    api('getAddons', {}).then(function(r) {
      if (r && r.ok) { ADDONS_DATA = r.addons || []; }
      _doAddItem(code);
    });
    return;
  }
  _doAddItem(code);
}

function _doAddItem(code) {
  var item = MENU_DATA.find(function(m) { return m.code === code });
  if (!item || !item.available) return;

  var applicableAddons = ADDONS_DATA.filter(function(a) {
    return a.applies_to_all || (a.applies_to_codes || []).includes(code);
  });

  // No options needed and no addons → add directly
  if (!item.hasSizes && !item.hasSugar && applicableAddons.length === 0) {
    addToCart(item, null, null, null, item.price, []);
    toast(esc(item.name) + ' added');
    return;
  }

  // No size/sugar but has addons → show addon selector directly
  if (!item.hasSizes && !item.hasSugar && applicableAddons.length > 0) {
    var html = '<div class="opt-header">' +
      '<div class="opt-item-name">' + esc(item.name) + '</div>' +
      '<div class="opt-item-detail">' + peso(item.price) + '</div>' +
      '</div>' +
      '<div class="opt-label">Add-ons <span style="font-weight:400;font-size:.8em;opacity:.7">(optional)</span></div>' +
      '<div id="addonGroup" style="display:flex;flex-direction:column;gap:6px">';
    applicableAddons.forEach(function(a) {
      html += '<button class="opt-btn" data-addon="' + esc(a.addon_code) + '" data-price="' + a.price + '" data-name="' + esc(a.name) + '" onclick="toggleAddon(this)">' +
        '<div class="opt-btn-radio" style="border-radius:4px"></div>' +
        '<div class="opt-btn-text"><div class="opt-btn-main">' + esc(a.name) + '</div></div>' +
        '<div style="font-weight:700;color:var(--terra);font-size:.88rem;white-space:nowrap">+' + peso(a.price) + '</div>' +
        '</button>';
    });
    html += '</div><button class="opt-confirm" onclick="addonConfirm(\'' + esc(item.code) + '\',\'\',\'\',' + item.price + ',\'\')">Add to Cart</button>';
    document.getElementById('optContent').innerHTML = html;
    if (!document.getElementById('optModal').classList.contains('open')) openModal('optModal');
    return;
  }

  // Show size/sugar selector
  if (item.hasSizes) {
    showSizeSelector(item);
  } else {
    showSugarSelector(item, null, null, item.price);
  }
}

function showSizeSelector(item) {
  var sizes = [
    { key:'short', label:'Short', oz:'12oz', price:item.sizes.short },
    { key:'medium', label:'Medium', oz:'16oz', price:item.sizes.medium, default:true },
    { key:'tall', label:'Tall', oz:'22oz', price:item.sizes.tall }
  ];

  var html = '<div class="opt-header">' +
    '<div class="opt-item-name">' + esc(item.name) + '</div>' +
    '<div class="opt-item-detail">' + esc(item.category) + '</div>' +
  '</div>' +
  '<div class="opt-label">Choose Size</div>' +
  '<div class="opt-group" id="sizeGroup">';

  sizes.forEach(function(s) {
    var sel = s.default ? ' selected' : '';
    var def = s.default ? '<span class="opt-btn-default">DEFAULT</span>' : '';
    var sizeClass = 'size-' + s.key.toLowerCase();
    var pipColor = s.key==='Short'?'#6baed6':s.key==='Medium'?'#4a9960':'#065f46';
    html += '<button class="opt-btn ' + sizeClass + sel + '" data-size="' + s.key + '" data-price="' + s.price + '" onclick="selectSize(this)">' +
      '<div class="opt-btn-radio"></div>' +
      '<div class="opt-btn-text"><div class="opt-btn-main"><span class="size-pip ' + s.key.toLowerCase() + '"></span>' + s.label + ' (' + s.oz + ')' + def + '</div></div>' +
      '<div class="opt-btn-price">' + peso(s.price) + '</div>' +
    '</button>';
  });

  html += '</div>' +
    '<button class="opt-confirm" onclick="sizeNext(\'' + item.code + '\')">Next →</button>';

  document.getElementById('optContent').innerHTML = html;
  openModal('optModal');
}

function selectSize(btn) {
  document.querySelectorAll('#sizeGroup .opt-btn').forEach(function(b) { b.classList.remove('selected') });
  btn.classList.add('selected');
}

function sizeNext(code) {
  var item = MENU_DATA.find(function(m) { return m.code === code });
  var sel = document.querySelector('#sizeGroup .opt-btn.selected');
  if (!sel) { toast('Please select a size'); return }

  var sizeKey = sel.dataset.size;
  var price = Number(sel.dataset.price);
  var sizeLabel = sel.querySelector('.opt-btn-main').textContent.replace('DEFAULT','').trim();

  if (item.hasSugar) {
    showSugarSelector(item, sizeKey, sizeLabel, price);
  } else {
    // No sugar — check for addons before adding
    var applicableAddons = ADDONS_DATA.filter(function(a) {
      return a.applies_to_all || (a.applies_to_codes || []).includes(code);
    });
    if (applicableAddons.length > 0) {
      showAddonSelector(item, sizeKey, sizeLabel, null, price, applicableAddons);
    } else {
      addToCart(item, sizeKey, sizeLabel, null, price, []);
      closeModal('optModal');
      toast(esc(item.name) + ' added');
    }
  }
}

function showSugarSelector(item, sizeKey, sizeLabel, price) {
  var html = '<div class="opt-header">' +
    '<div class="opt-item-name">' + esc(item.name) + '</div>' +
    '<div class="opt-item-detail">' + (sizeLabel ? esc(sizeLabel) + ' — ' : '') + peso(price) + '</div>' +
  '</div>' +
  '<div class="opt-label">Choose Sugar Level</div>' +
  '<div class="opt-group" id="sugarGroup">';

  SUGAR_LEVELS.forEach(function(s) {
    var sel = s.default ? ' selected' : '';
    var def = s.default ? '<span class="opt-btn-default">SIGNATURE</span>' : '';
    var sugarClass = 'sugar-' + s.id;
    html += '<button class="opt-btn ' + sugarClass + sel + '" data-sugar="' + s.id + '" onclick="selectSugar(this)">' +
      '<div class="opt-btn-radio"></div>' +
      '<div class="opt-btn-text">' +
        '<div class="opt-btn-main"><span class="sugar-bar ' + s.id + '"></span>' + s.label + ' (' + s.pct + ')' + def + '</div>' +
        '<div class="opt-btn-sub">' + s.desc + '</div>' +
      '</div>' +
    '</button>';
  });

  html += '</div>' +
    '<button class="opt-confirm" onclick="sugarConfirm(\'' + item.code + '\',\'' + (sizeKey||'') + '\',\'' + esc(sizeLabel||'') + '\',' + price + ')">Add to Cart</button>';

  document.getElementById('optContent').innerHTML = html;
  if (!document.getElementById('optModal').classList.contains('open')) openModal('optModal');
}

function selectSugar(btn) {
  document.querySelectorAll('#sugarGroup .opt-btn').forEach(function(b) { b.classList.remove('selected') });
  btn.classList.add('selected');
}

function sugarConfirm(code, sizeKey, sizeLabel, price) {
  var item = MENU_DATA.find(function(m) { return m.code === code });
  var sel = document.querySelector('#sugarGroup .opt-btn.selected');
  if (!sel) { toast('Please select sugar level'); return }

  var sugarId = sel.dataset.sugar;
  var sugarObj = SUGAR_LEVELS.find(function(s) { return s.id === sugarId });

  // Check if there are addons for this item
  var applicableAddons = ADDONS_DATA.filter(function(a) {
    return a.applies_to_all || (a.applies_to_codes || []).includes(code);
  });

  if (applicableAddons.length > 0) {
    showAddonSelector(item, sizeKey, sizeLabel, sugarObj, price, applicableAddons);
  } else {
    addToCart(item, sizeKey || null, sizeLabel || null, sugarObj, price, []);
    closeModal('optModal');
    toast(esc(item.name) + ' added');
  }
}

function showAddonSelector(item, sizeKey, sizeLabel, sugarObj, price, addons) {
  var detailParts = [];
  if (sizeLabel) detailParts.push(sizeLabel);
  if (sugarObj) detailParts.push(sugarObj.label);
  detailParts.push(peso(price));

  var html = '<div class="opt-header">' +
    '<div class="opt-item-name">' + esc(item.name) + '</div>' +
    '<div class="opt-item-detail">' + esc(detailParts.join(' · ')) + '</div>' +
    '</div>' +
    '<div class="opt-label">Add-ons <span style="font-weight:400;font-size:.8em;opacity:.7">(optional)</span></div>' +
    '<div id="addonGroup" style="display:flex;flex-direction:column;gap:6px">';

  addons.forEach(function(a) {
    html += '<button class="opt-btn" data-addon="' + esc(a.addon_code) + '" data-price="' + a.price + '" data-name="' + esc(a.name) + '" onclick="toggleAddon(this)">' +
      '<div class="opt-btn-radio" style="border-radius:4px"></div>' +
      '<div class="opt-btn-text">' +
        '<div class="opt-btn-main">' + esc(a.name) + '</div>' +
      '</div>' +
      '<div style="font-weight:700;color:var(--terra);font-size:.88rem;white-space:nowrap">+' + peso(a.price) + '</div>' +
    '</button>';
  });

  html += '</div>' +
    '<button class="opt-confirm" onclick="addonConfirm(\'' + esc(item.code) + '\',\'' + (sizeKey||'') + '\',\'' + esc(sizeLabel||'') + '\',' + price + ',\'' + (sugarObj ? sugarObj.id : '') + '\')">Add to Cart</button>';

  document.getElementById('optContent').innerHTML = html;
}

function toggleAddon(btn) {
  btn.classList.toggle('selected');
}

function addonConfirm(code, sizeKey, sizeLabel, price, sugarId) {
  var item = MENU_DATA.find(function(m) { return m.code === code });
  var sugarObj = SUGAR_LEVELS.find(function(s) { return s.id === sugarId }) || null;

  // Collect selected addons
  var selectedAddons = [];
  var totalAddonPrice = 0;
  document.querySelectorAll('#addonGroup .opt-btn.selected').forEach(function(btn) {
    var addonPrice = parseFloat(btn.dataset.price) || 0;
    selectedAddons.push({ code: btn.dataset.addon, name: btn.dataset.name, price: addonPrice });
    totalAddonPrice += addonPrice;
  });

  addToCart(item, sizeKey || null, sizeLabel || null, sugarObj, price + totalAddonPrice, selectedAddons);
  closeModal('optModal');
  var addonNames = selectedAddons.map(function(a) { return a.name; }).join(', ');
  toast(esc(item.name) + (addonNames ? ' + ' + addonNames : '') + ' added');
}

// ══════════════════════════════════════════════════════════
// CART MANAGEMENT
// ══════════════════════════════════════════════════════════
function addToCart(item, sizeKey, sizeLabel, sugarObj, price, addons) {
  var sugarId = sugarObj ? sugarObj.id : '';
  addons = addons || [];
  var addonKey = addons.map(function(a) { return a.code; }).sort().join(',');

  // Only merge if same code + size + sugar + addons
  var existing = state.cart.find(function(c) {
    return c.code === item.code &&
           (c.size||'') === (sizeKey||'') &&
           (c.sugar||'') === sugarId &&
           (c.addonKey||'') === addonKey;
  });

  if (existing) {
    existing.qty++;
  } else {
    var addonTotal = addons.reduce(function(s, a) { return s + (a.price||0); }, 0);
    state.cart.push({
      code: item.code,
      name: item.name,
      price: price,
      basePrice: price - addonTotal,
      qty: 1,
      size: sizeKey || '',
      sizeLabel: sizeLabel || '',
      sugar: sugarId,
      sugarLabel: sugarObj ? sugarObj.label : '',
      addons: addons,
      addonKey: addonKey,
      imgUrl: getImgUrl(item)
    });
  }

  updateCartBar();
  renderMenu(); // Update badges
}

function updateCartBar() {
  var bar = document.getElementById('cartBar');
  var totalItems = 0, totalPrice = 0;
  state.cart.forEach(function(c) { totalItems += c.qty; totalPrice += c.price * c.qty });

  if (totalItems > 0) {
    bar.classList.add('visible');
    document.getElementById('cartCount').textContent = totalItems + (totalItems === 1 ? ' item' : ' items');
    document.getElementById('cartTotal').textContent = peso(totalPrice);
  } else {
    bar.classList.remove('visible');
  }
}

function getCartSubtotal() {
  var total = 0;
  state.cart.forEach(function(c) { total += c.price * c.qty });
  return total;
}

// ══════════════════════════════════════════════════════════
// CART PAGE
// ══════════════════════════════════════════════════════════
function renderCartPage() {
  var body = document.getElementById('cartBody');

  if (state.cart.length === 0) {
    body.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div>Your cart is empty</div><div style="margin-top:16px"><button class="btn-secondary" onclick="closePage(\'cart\')">Browse Menu</button></div></div>';
    return;
  }

  var html = '';
  state.cart.forEach(function(c, i) {
    var meta = '';
    if (c.sizeLabel) meta += c.sizeLabel;
    if (c.sugarLabel) meta += (meta ? ' | ' : '') + c.sugarLabel;
    if (c.addons && c.addons.length) meta += (meta ? ' | ' : '') + c.addons.map(function(a){return '+'+a.name;}).join(', ');

    html += '<div class="cart-item">' +
      (c.imgUrl ? '<img class="cart-item-img" src="' + c.imgUrl + '" alt="" onerror="this.style.display=\'none\'">' : '<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem">' + getCategoryIcon(MENU_DATA.find(function(m){return m.code===c.code})?.category||'') + '</div>') +
      '<div class="cart-item-info">' +
        '<div class="cart-item-name">' + esc(c.name) + '</div>' +
        (meta ? '<div class="cart-item-meta">' + esc(meta) + '</div>' : '') +
        '<div class="cart-item-price">' + peso(c.price) + (c.qty > 1 ? ' × ' + c.qty + ' = ' + peso(c.price * c.qty) : '') + '</div>' +
      '</div>' +
      '<div class="cart-qty">' +
        '<button class="q-minus" onclick="cartQty(' + i + ',-1)">−</button>' +
        '<span class="q-num">' + c.qty + '</span>' +
        '<button class="q-plus" onclick="cartQty(' + i + ',1)">+</button>' +
      '</div>' +
    '</div>';
  });

  var subtotal = getCartSubtotal();
  html += '<div class="divider"></div>' +
    '<div class="summary-row"><span>Subtotal</span><span>' + peso(subtotal) + '</span></div>' +
    '<div style="font-size:.72rem;color:var(--timber);margin-bottom:20px">Service charge calculated at checkout</div>' +
    '<button class="btn-primary" onclick="closePage(\'cart\');openPage(\'checkout\')">Proceed to Checkout →</button>' +
    '<button class="btn-secondary mt-16" onclick="if(confirm(\'Clear your cart?\')){state.cart=[];updateCartBar();renderMenu();closePage(\'cart\')}">Clear Cart</button>';

  body.innerHTML = html;
}

function cartQty(idx, delta) {
  state.cart[idx].qty += delta;
  if (state.cart[idx].qty <= 0) state.cart.splice(idx, 1);
  updateCartBar();
  renderMenu();
  renderCartPage();
  if (state.cart.length === 0) { closePage('cart') }
}

// ══════════════════════════════════════════════════════════
// CHECKOUT PAGE

    if (c.sizeLabel) meta += c.sizeLabel;

  var btnDis = !state.checkoutPayMethod ? ' disabled style="opacity:.45;cursor:not-allowed"' : '';

function setOrderType(type) {

function setCheckoutPay(method) {

// ══════════════════════════════════════════════════════════
// PLACE ORDER
// ══════════════════════════════════════════════════════════
async function placeOrder() {
  if (!state.checkoutPayMethod) { toast('Please select a payment method first'); return; }

  state.customerName = (document.getElementById('custName') || {value:''}).value.trim();
  state.orderNotes   = (document.getElementById('custNotes') || {value:''}).value.trim();

  // Name is required
  if (!state.customerName) {
    toast('Please enter your name to continue');
    var nameEl = document.getElementById('custName');
    if (nameEl) { nameEl.focus(); nameEl.style.border = '2px solid #e04444'; }
    return;
  }

  var subtotal = getCartSubtotal();
  var svc = state.orderType === 'dine-in' ? Math.round(subtotal * SERVICE_CHARGE_RATE * 100) / 100 : 0;
  var total = subtotal + svc;

  // GCash: show QR + upload form FIRST — order only placed after proof submitted
  if (state.checkoutPayMethod === 'gcash') {
    state._pendingOrder = {
      customerName: state.customerName,
      orderNotes:   state.orderNotes,
      orderType:    state.orderType,
      subtotal:     subtotal,
      svc:          svc,
      total:        total,
      items:        state.cart.map(function(c){ return { code:c.code, qty:c.qty, price:c.price, size:c.size||'', sugarLevel:c.sugar||'', addons:c.addons||[] }; })
    };
    closePage('checkout');
    openPage('payment');
    state.paymentMethod = 'qr';
    renderPaymentPage();
    return;
  }

  var btn = document.getElementById('placeOrderBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Placing Order...'; }

  // Guard: if already placing, ignore second tap entirely
  if (state._placingOrder) return;
  state._placingOrder = true;

  var items = state.cart.map(function(c) {
    return {
      code: c.code,
      qty: c.qty,
      price: c.price,
      size: c.size || '',
      sugarLevel: c.sugar || '',
      addons: c.addons || []
    };
  });

  var result = await api('placeOrder', {
    tableNo: state.tableNo || '1',
    token: state.token || '',
    customerName: state.customerName,
    notes: state.orderNotes,
    orderType: state.orderType.toUpperCase(),
    items: items
  });

  if (result.ok) {
    state.orderId = result.orderId || result.ORDER_ID || (window.ORDER_PREFIX||'ORD') + '-???';
    state.orderTotal = result.total || total;
    state.orderStatus = 'NEW';
    state.paymentMethod = state.checkoutPayMethod || '';
    closePage('checkout');
    openPage('receipt');
    renderReceiptPage();
  } else if (result.timeout) {
    state._placingOrder = false;
    if (btn) { btn.disabled = false; btn.textContent = 'Place Order — ' + peso(total); }
    toast('⏱ Taking too long — your order may have gone through. Please show this to staff and they will check.', 6000);
  } else {
    state._placingOrder = false;
    toast('Order failed: ' + (result.error || 'Please try again'));
    if (btn) { btn.disabled = false; btn.textContent = 'Place Order — ' + peso(total); }
  }
}

      '<div class="receipt-option" onclick="promptSimpleEmail()">' +

      '<div class="receipt-option" onclick="selectReceiptDelivery(\'printed\')">' +

      '<div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="rName" placeholder="Juan Dela Cruz"></div>' +
      '<div class="form-group"><label class="form-label">Address *</label><input class="form-input" id="rAddr" placeholder="123 Main St, Amadeo, Cavite"></div>' +
      '<div class="form-group"><label class="form-label">TIN (Optional)</label><input class="form-input" id="rTIN" placeholder="123-456-789-000"></div>' +
      '<button class="btn-primary" onclick="saveReceiptDetails()">Next →</button>' +
      '<button class="btn-secondary mt-16" onclick="state.receiptType=\'\';renderReceiptPage()">← Back</button>';
  } else if (step === 'delivery') {
    html += '<div style="font-family:var(--font-soul);font-size:1.05rem;font-weight:700;margin-bottom:16px;text-align:center">How would you like your receipt?</div>' +
      '<div class="receipt-option" onclick="selectReceiptDelivery(\'email\')">' +
        '<h4>📧 Email Receipt</h4><p>Sent to your email instantly • Full price</p></div>' +
      '<div class="receipt-option" onclick="selectReceiptDelivery(\'printed\')">' +
        '<h4>🖨️ Printed Receipt</h4><p>Pick up at counter • Discounts available</p></div>' +

// Simple receipt: show inline email prompt
function promptSimpleEmail() {
  var body = document.getElementById('receiptBody');
  var html = '<div class="status-card mb-16"><div class="status-icon">📧</div>' +
    '<div class="status-title">Email Receipt</div>' +
    '<div style="font-size:.82rem;color:var(--timber);margin-top:4px">' + esc(state.orderId) + ' — ' + peso(state.orderTotal) + '</div></div>' +
    '<div class="form-group"><label class="form-label">Enter your email address</label>' +
    '<input class="form-input" id="rSimpleEmail" type="email" placeholder="your@email.com" autofocus></div>' +
    '<button class="btn-primary" onclick="submitSimpleEmail()">Send Receipt →</button>' +
    '<button class="btn-secondary mt-16" onclick="state.receiptEmail=\'\';renderReceiptPage()">← Back</button>';
  body.innerHTML = html;
  setTimeout(function() { var el = document.getElementById('rSimpleEmail'); if(el) el.focus(); }, 100);
}

function submitSimpleEmail() {
  var email = document.getElementById('rSimpleEmail').value.trim();
  if (!email || email.indexOf('@') === -1) {
    toast('Please enter a valid email');
    return;
  }
  state.receiptEmail = email;
  selectReceiptDelivery('email');
}

function saveReceiptDetails() {
  state.receiptEmail = document.getElementById('rEmail').value.trim();
  state.receiptName = document.getElementById('rName').value.trim();
  state.receiptAddress = document.getElementById('rAddr').value.trim();
  state.receiptTIN = document.getElementById('rTIN').value.trim();

  if (!state.receiptEmail || !state.receiptName || !state.receiptAddress) {
    toast('Please fill in all required fields');
    return;
  }
  renderReceiptPage();
}

async function selectReceiptDelivery(method) {
  state.receiptDelivery = method;

  // Show loading state for email
  if (method === 'email') {
    toast('Sending receipt...');
  }

  // Send receipt request to backend (now actually sends email if method=email)
  const result = await api('requestReceipt', {
    orderId:        state.orderId,
    receiptType:    state.receiptType,
    deliveryMethod: method,
    email:          state.receiptEmail,
    name:           state.receiptName,
    address:        state.receiptAddress,
    tin:            state.receiptTIN
  });

  if (method === 'email') {
    if (result && result.ok && result.sent) {
      toast('✅ Receipt sent to ' + state.receiptEmail + '!');
    } else if (result && result.error) {
      toast('⚠️ ' + result.error);
    } else {
      toast('Receipt emailed!');
    }
  } else {
    toast('Pick up your receipt at the counter');
  }

  closePage('receipt');
  // Payment already done — go straight to order status
  openPage('status');
  startStatusPolling();
}
