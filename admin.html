<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YANI · Kitchen Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --forest: #314C47;
  --forest-deep: #1E3530;
  --forest-light: #3D5E57;
  --terra: #C4704B;
  --terra-light: #D4916F;
  --gold: #B8973A;
  --timber: #6B7B6E;
  --mist: #D2D5CD;
  --mist-light: #EEF0EB;
  --cream: #FAF8F4;
  --white: #FFFFFF;
  --font-soul: 'Crimson Pro', Georgia, serif;
  --font-body: 'Quicksand', sans-serif;
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
body { font-family:var(--font-body); background:var(--cream); color:var(--forest-deep); min-height:100dvh }

/* ── Login ── */
.login-overlay {
  position:fixed; inset:0; background:var(--forest-deep);
  display:flex; align-items:center; justify-content:center;
  z-index:999;
}
.login-overlay.hidden { display:none }
.login-box {
  background:var(--white); border-radius:var(--r-xl); padding:40px 32px;
  text-align:center; width:90%; max-width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.login-logo { width:72px; height:72px; border-radius:50%; object-fit:cover; margin-bottom:16px; box-shadow:var(--shadow-md) }
.login-title { font-family:var(--font-soul); font-size:1.4rem; font-weight:700; margin-bottom:4px }
.login-sub { font-size:.78rem; color:var(--timber); margin-bottom:24px }
.pin-input {
  width:100%; padding:14px; border:2px solid var(--mist); border-radius:var(--r-md);
  font-size:1.2rem; text-align:center; letter-spacing:8px; font-weight:700;
  font-family:var(--font-body); outline:none; transition:border-color .2s;
}
.pin-input:focus { border-color:var(--forest) }
.pin-input.error { border-color:var(--terra); animation:shake .4s }
@keyframes shake { 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }
.pin-btn {
  width:100%; padding:14px; background:var(--forest); color:var(--white);
  border:none; border-radius:var(--r-md); font-size:.92rem; font-weight:700;
  font-family:var(--font-body); cursor:pointer; margin-top:16px;
}
.pin-btn:active { background:var(--forest-light) }

/* ── Top Bar ── */
.topbar {
  background:linear-gradient(160deg, var(--forest-deep) 0%, var(--forest) 60%, var(--forest-light) 100%);
  color:var(--white); padding:14px 20px;
  display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 16px rgba(0,0,0,.15);
}
.topbar::after {
  content:''; position:absolute; bottom:-4px; left:0; right:0; height:4px;
  background:linear-gradient(to right, var(--gold), var(--terra), var(--gold)); opacity:.6;
}
.topbar-logo { width:36px; height:36px; border-radius:50%; object-fit:cover }
.topbar-title { font-family:var(--font-soul); font-size:1.15rem; font-weight:700; flex:1 }
.topbar-live { display:flex; align-items:center; gap:6px; font-size:.72rem; font-weight:600; opacity:.8 }
.topbar-dot { width:8px; height:8px; border-radius:50%; background:#4ADE80; animation:pulse 2s infinite }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Stats Bar ── */
.stats-bar {
  display:flex; gap:1px; background:var(--mist); margin:16px; border-radius:var(--r-lg); overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.stat-card {
  flex:1; background:var(--white); padding:14px 12px; text-align:center;
}
.stat-value { font-family:var(--font-soul); font-size:1.4rem; font-weight:700; color:var(--forest) }
.stat-label { font-size:.65rem; color:var(--timber); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-top:2px }

/* ── Filter Tabs ── */
.filter-bar {
  display:flex; gap:6px; padding:0 16px 12px; overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.filter-btn {
  padding:8px 14px; border-radius:20px; font-size:.75rem; font-weight:700;
  border:1.5px solid var(--mist); background:var(--white); color:var(--timber);
  cursor:pointer; white-space:nowrap; font-family:var(--font-body); transition:all .15s;
}
.filter-btn.active { background:var(--forest); color:var(--white); border-color:var(--forest) }
.filter-count {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:18px; height:18px; border-radius:9px; font-size:.65rem;
  background:rgba(0,0,0,.1); margin-left:4px; padding:0 5px;
}
.filter-btn.active .filter-count { background:rgba(255,255,255,.25) }

/* ── Order Grid ── */
.order-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:14px; padding:0 16px 100px;
}
.order-card {
  background:var(--white); border-radius:var(--r-lg); overflow:hidden;
  box-shadow:var(--shadow-sm); border-left:4px solid var(--mist);
  transition:box-shadow .2s;
}
.order-card:hover { box-shadow:var(--shadow-md) }
.order-card[data-status="NEW"] { border-left-color:#F59E0B }
.order-card[data-status="PREPARING"] { border-left-color:#3B82F6 }
.order-card[data-status="READY"] { border-left-color:#10B981 }
.order-card[data-status="COMPLETED"] { border-left-color:var(--mist) }
.order-card[data-status="CANCELLED"] { border-left-color:#EF4444; opacity:.6 }
.order-card[data-platform="GRAB"] { border-right:4px solid #00B14F }
.order-card[data-platform="FOODPANDA"] { border-right:4px solid #D70246 }
.order-card[data-platform="OTHER"] { border-right:4px solid #6366F1 }

.oc-header {
  display:flex; align-items:center; gap:10px; padding:14px 16px 10px;
}
.oc-status-badge {
  padding:3px 10px; border-radius:12px; font-size:.68rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.3px;
}
.oc-status-badge.new { background:#FEF3C7; color:#92400E }
.oc-status-badge.preparing { background:#DBEAFE; color:#1E40AF }
.oc-status-badge.ready { background:#D1FAE5; color:#065F46 }
.oc-status-badge.completed { background:var(--mist-light); color:var(--timber) }
.oc-status-badge.cancelled { background:#FEE2E2; color:#991B1B }

.oc-id { font-family:var(--font-soul); font-size:1rem; font-weight:700; flex:1 }
.oc-time { font-size:.7rem; color:var(--timber); font-weight:500 }

.oc-meta {
  display:flex; gap:12px; padding:0 16px 10px; font-size:.78rem; color:var(--timber);
}
.oc-meta-item { display:flex; align-items:center; gap:4px }

.oc-items { padding:0 16px }
.oc-item {
  padding:8px 0; border-top:1px solid var(--mist-light);
  display:flex; align-items:flex-start; gap:8px;
}
.oc-item:first-child { border-top:none }
.oc-item-qty {
  min-width:24px; height:24px; border-radius:6px; background:var(--mist-light);
  display:flex; align-items:center; justify-content:center;
  font-size:.72rem; font-weight:700; color:var(--forest); flex-shrink:0;
}
.oc-item-info { flex:1 }
.oc-item-name { font-size:.82rem; font-weight:600 }
.oc-item-opts { font-size:.7rem; color:var(--terra); font-weight:500; margin-top:1px }
.oc-item-notes { font-size:.68rem; color:var(--timber); font-style:italic; margin-top:2px }

.oc-total {
  padding:10px 16px; font-size:.82rem; font-weight:700; text-align:right;
  border-top:1px solid var(--mist-light); color:var(--terra);
}

.oc-notes {
  padding:8px 16px; font-size:.72rem; color:var(--timber); font-style:italic;
  background:var(--mist-light); margin:0 12px 12px; border-radius:var(--r-sm);
}

.oc-actions {
  display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--mist-light);
}
.oc-btn {
  flex:1; padding:10px; border:none; border-radius:var(--r-md);
  font-size:.78rem; font-weight:700; cursor:pointer; font-family:var(--font-body);
  transition:all .15s;
}
.oc-btn:active { transform:scale(.97) }
.oc-btn-start { background:#3B82F6; color:#fff }
.oc-btn-ready { background:#10B981; color:#fff }
.oc-btn-complete { background:var(--forest); color:#fff }
.oc-btn-cancel { background:var(--mist-light); color:#EF4444; font-weight:600 }
.oc-btn-print { background:var(--white); color:var(--forest); border:1.5px solid var(--forest) !important; margin-top:6px; width:100% }
.oc-btn-print:hover { background:var(--forest); color:var(--white) }

/* Delete button */
.oc-btn-delete { background:#EF4444; color:var(--white); border:1.5px solid #EF4444 !important; margin-top:6px; width:100%; font-size:.75rem }
.oc-btn-delete:hover { background:#DC2626; border-color:#DC2626 !important }

/* Bulk actions bar */
.bulk-actions {
  background:var(--mist-light); padding:12px 16px; border-radius:var(--r-md);
  margin-bottom:16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.bulk-actions-label { font-size:.85rem; font-weight:600; color:var(--timber) }
.bulk-btn {
  padding:8px 16px; border:none; border-radius:var(--r-md);
  font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s;
  font-family:var(--font-body);
}
.bulk-btn-danger { background:#EF4444; color:white }
.bulk-btn-danger:hover { background:#DC2626; transform:translateY(-1px); box-shadow:0 2px 8px rgba(239,68,68,.3) }

/* ── Empty State ── */
.empty-state {
  text-align:center; padding:60px 20px; color:var(--timber);
}
.empty-icon { font-size:3rem; margin-bottom:12px; opacity:.5 }
.empty-text { font-size:.88rem }

/* ── Payment Badge ── */
.oc-payment {
  display:inline-flex; align-items:center; gap:5px;
  padding:6px 12px; margin:0 16px 10px; border-radius:var(--r-sm);
  font-size:.72rem; font-weight:700;
}
.oc-payment.submitted { background:#FEF3C7; color:#92400E }
.oc-payment.verified { background:#D1FAE5; color:#065F46 }
.oc-payment.none { background:var(--mist-light); color:var(--timber) }

/* ── Quick Links ── */
.quick-links {
  display:flex; gap:8px; padding:0 16px 14px; overflow-x:auto;
}
.quick-link {
  display:flex; align-items:center; gap:6px;
  padding:10px 16px; border-radius:var(--r-md);
  background:var(--white); border:1.5px solid var(--mist);
  font-size:.75rem; font-weight:600; color:var(--forest);
  text-decoration:none; white-space:nowrap;
  box-shadow:var(--shadow-sm); transition:all .15s;
}
.quick-link:hover { border-color:var(--forest); box-shadow:var(--shadow-md) }
.quick-link-icon { font-size:1rem }
.quick-link-badge {
  background:var(--terra); color:#fff; padding:1px 7px;
  border-radius:10px; font-size:.65rem; font-weight:700;
}

/* ── Payment Management Cards ── */
.pay-card {
  background:var(--white); border-radius:var(--r-lg); overflow:hidden;
  box-shadow:var(--shadow-sm); border-left:4px solid #F59E0B;
  transition:box-shadow .2s;
}
.pay-card:hover { box-shadow:var(--shadow-md) }
.pay-card.verified { border-left-color:#10B981; opacity:.7 }
.pay-card.rejected { border-left-color:#EF4444; opacity:.5 }
.pay-header {
  display:flex; align-items:center; gap:10px; padding:14px 16px 8px;
}
.pay-id { font-family:var(--font-soul); font-size:.95rem; font-weight:700; flex:1 }
.pay-status {
  padding:3px 10px; border-radius:12px; font-size:.68rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.3px;
}
.pay-status.pending { background:#FEF3C7; color:#92400E }
.pay-status.verified { background:#D1FAE5; color:#065F46 }
.pay-status.rejected { background:#FEE2E2; color:#991B1B }
.pay-meta {
  display:flex; flex-wrap:wrap; gap:10px; padding:0 16px 10px; font-size:.78rem; color:var(--timber);
}
.pay-meta-item { display:flex; align-items:center; gap:4px }
.pay-amount {
  padding:8px 16px; font-size:1rem; font-weight:700; color:var(--terra);
  border-top:1px solid var(--mist-light);
}
.pay-screenshot {
  padding:0 16px 12px;
}
.pay-screenshot a {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 14px; border-radius:var(--r-sm);
  background:var(--mist-light); color:var(--forest);
  font-size:.75rem; font-weight:600; text-decoration:none;
  transition:all .15s;
}
.pay-screenshot a:hover { background:var(--forest); color:#fff }
.pay-actions {
  display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--mist-light);
}
.pay-btn {
  flex:1; padding:10px; border:none; border-radius:var(--r-md);
  font-size:.78rem; font-weight:700; cursor:pointer; font-family:var(--font-body);
  transition:all .15s;
}
.pay-btn:active { transform:scale(.97) }
.pay-btn-verify { background:#10B981; color:#fff }
.pay-btn-reject { background:var(--mist-light); color:#EF4444 }
.pay-btn:disabled { opacity:.4; cursor:not-allowed }

/* ── Payment Filter Sub-tabs ── */
.pay-filters {
  display:flex; gap:6px; padding:0 16px 12px;
}
.pay-filter-btn {
  padding:6px 12px; border-radius:16px; font-size:.7rem; font-weight:700;
  border:1.5px solid var(--mist); background:var(--white); color:var(--timber);
  cursor:pointer; font-family:var(--font-body); transition:all .15s;
}
.pay-filter-btn.active { background:var(--terra); color:#fff; border-color:var(--terra) }

/* ── Responsive ── */
@media (max-width:640px) {
  .order-grid { grid-template-columns:1fr }
  .stats-bar { margin:12px }
  .stat-value { font-size:1.2rem }
}

/* ── Platform Badge on Order Cards ── */
.oc-platform-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 10px; border-radius:12px; font-size:.68rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.3px;
}
.oc-platform-badge.grab { background:#00B14F20; color:#00B14F }
.oc-platform-badge.foodpanda { background:#D7024620; color:#D70246 }
.oc-platform-badge.other { background:#6366F120; color:#6366F1 }
.oc-platform-ref { font-size:.7rem; color:var(--timber); padding:0 16px 6px }

/* ── Platform Order Modal ── */
.po-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200;
  display:none; align-items:flex-end; justify-content:center;
}
.po-overlay.open { display:flex }
.po-modal {
  background:var(--cream); width:100%; max-width:600px; max-height:92vh;
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 -4px 30px rgba(0,0,0,.25);
}
.po-header {
  background:var(--forest); color:#fff; padding:16px 20px;
  display:flex; align-items:center; gap:12px;
}
.po-header-title { flex:1; font-family:var(--font-soul); font-size:1.1rem; font-weight:700 }
.po-close { background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; padding:4px }
.po-body { flex:1; overflow-y:auto; padding:16px }

/* Platform selector */
.po-platforms { display:flex; gap:8px; margin-bottom:16px }
.po-plat-btn {
  flex:1; padding:12px 8px; border-radius:var(--r-md); border:2px solid var(--mist);
  background:var(--white); font-family:var(--font-body); font-size:.8rem; font-weight:700;
  cursor:pointer; text-align:center; transition:all .15s;
}
.po-plat-btn.active { border-color:var(--forest); background:var(--forest); color:#fff }
.po-plat-btn .po-plat-icon { font-size:1.3rem; display:block; margin-bottom:4px }

/* Ref input */
.po-ref-row { display:flex; gap:8px; margin-bottom:16px; align-items:center }
.po-ref-input {
  flex:1; padding:10px 14px; border:1.5px solid var(--mist); border-radius:var(--r-md);
  font-family:var(--font-body); font-size:.85rem; outline:none;
}
.po-ref-input:focus { border-color:var(--forest) }

/* Menu categories */
.po-cats { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px }
.po-cat-btn {
  padding:6px 14px; border-radius:16px; font-size:.72rem; font-weight:700;
  border:1.5px solid var(--mist); background:var(--white); color:var(--timber);
  cursor:pointer; white-space:nowrap; font-family:var(--font-body);
}
.po-cat-btn.active { background:var(--terra); color:#fff; border-color:var(--terra) }

/* Menu items grid */
.po-menu-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:8px;
  margin-bottom:16px;
}
.po-menu-item {
  background:var(--white); border-radius:var(--r-md); padding:10px; cursor:pointer;
  border:1.5px solid var(--mist); transition:all .15s;
}
.po-menu-item:active { transform:scale(.97) }
.po-menu-item-name { font-size:.78rem; font-weight:600; color:var(--forest) }
.po-menu-item-price { font-size:.72rem; color:var(--terra); font-weight:700; margin-top:2px }
.po-menu-item-cat { font-size:.62rem; color:var(--timber); text-transform:uppercase }

/* Size/Sugar popup */
.po-popup {
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:250;
  display:none; align-items:center; justify-content:center;
}
.po-popup.open { display:flex }
.po-popup-box {
  background:var(--white); border-radius:var(--r-xl); padding:24px; width:90%; max-width:340px;
  box-shadow:0 12px 40px rgba(0,0,0,.2);
}
.po-popup-title { font-family:var(--font-soul); font-size:1rem; font-weight:700; margin-bottom:4px }
.po-popup-sub { font-size:.78rem; color:var(--timber); margin-bottom:16px }
.po-option {
  display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--r-md);
  border:1.5px solid var(--mist); margin-bottom:6px; cursor:pointer; transition:all .15s;
}
.po-option:hover { border-color:var(--forest-light) }
.po-option.selected { border-color:var(--forest); background:var(--forest); color:#fff }
.po-option-label { flex:1; font-size:.82rem; font-weight:600 }
.po-option-price { font-size:.78rem; font-weight:700 }
.po-popup-btn {
  width:100%; padding:12px; border:none; border-radius:var(--r-md); margin-top:12px;
  background:var(--forest); color:#fff; font-size:.85rem; font-weight:700;
  cursor:pointer; font-family:var(--font-body);
}

/* Cart */
.po-cart { background:var(--white); border-radius:var(--r-lg); padding:14px; margin-bottom:12px }
.po-cart-title { font-size:.78rem; font-weight:700; color:var(--timber); margin-bottom:8px }
.po-cart-item {
  display:flex; align-items:center; gap:8px; padding:6px 0;
  border-bottom:1px solid var(--mist-light); font-size:.78rem;
}
.po-cart-item:last-child { border-bottom:none }
.po-cart-item-name { flex:1; font-weight:600; color:var(--forest) }
.po-cart-item-opts { font-size:.68rem; color:var(--terra) }
.po-cart-item-price { font-weight:700; color:var(--terra) }
.po-cart-qty {
  display:flex; align-items:center; gap:4px;
}
.po-cart-qty button {
  width:24px; height:24px; border-radius:6px; border:1px solid var(--mist);
  background:var(--white); cursor:pointer; font-weight:700; font-size:.8rem;
}
.po-cart-remove { color:#EF4444; cursor:pointer; font-size:.9rem }

/* Cart footer */
.po-cart-footer {
  background:var(--white); padding:14px 20px; border-top:2px solid var(--mist);
}
.po-cart-total {
  display:flex; justify-content:space-between; font-size:1rem; font-weight:700;
  color:var(--forest); margin-bottom:10px;
}
.po-submit-btn {
  width:100%; padding:14px; border:none; border-radius:var(--r-md);
  background:var(--forest); color:#fff; font-size:.92rem; font-weight:700;
  cursor:pointer; font-family:var(--font-body);
}
.po-submit-btn:disabled { opacity:.4; cursor:not-allowed }
.po-submit-btn:active:not(:disabled) { background:var(--forest-light) }

/* Fab Button */
.fab-platform {
  position:fixed; bottom:24px; right:24px; z-index:150;
  width:56px; height:56px; border-radius:50%;
  background:var(--terra); color:#fff; border:none;
  font-size:1.5rem; cursor:pointer;
  box-shadow:0 4px 16px rgba(196,112,75,.4);
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s;
}
.fab-platform:active { transform:scale(.92) }
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <img class="login-logo" src="/images/logo.png" alt="Yani">
    <div class="login-title">Kitchen Dashboard</div>
    <div class="login-sub">Enter staff PIN to continue</div>
    <input class="pin-input" id="pinInput" type="password" maxlength="4" inputmode="numeric" placeholder="• • • •" autofocus>
    <button class="pin-btn" id="pinBtn" onclick="login()">Enter Dashboard</button>
  </div>
</div>

<!-- ═══════════════════ DASHBOARD ═══════════════════ -->

<script>
// ══════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════
var API_URL = '/api/pos';
var POLL_INTERVAL = 5000;
var pollTimer = null;
var currentFilter = 'ACTIVE';
var allOrders = [];
var lastOrderCount = 0;
var allPayments = [];
var pendingPayCount = 0;
var payFilter = 'PENDING';

// Session data (Phase 1 Security)
var currentUser = {
  userId: null,
  username: null,
  role: null
};

var STATUS_CONFIG = {
  NEW:       { icon:'🔔', label:'New',       badge:'new',       actions:['start','cancel'] },
  PREPARING: { icon:'👨‍🍳', label:'Preparing', badge:'preparing', actions:['ready','cancel'] },
  READY:     { icon:'✨', label:'Ready',     badge:'ready',     actions:['complete','cancel'] },
  COMPLETED: { icon:'🎉', label:'Completed', badge:'completed', actions:[] },
  CANCELLED: { icon:'❌', label:'Cancelled', badge:'cancelled', actions:[] }
};

// ══════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════

// SHA-256 hash function for PIN security
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  return hashHex;
}

document.getElementById('pinInput').addEventListener('keyup', function(e) {
  if (e.key === 'Enter') login();
});

async function login() {
  var pin = document.getElementById('pinInput').value.trim();
  if (!pin) return;

  var btn = document.getElementById('pinBtn');
  btn.textContent = 'Verifying...';
  btn.disabled = true;

  try {
    // Call the backend verifyAdminPin endpoint
    var resp = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'verifyAdminPin', pin: pin })
    });
    var data = await resp.json();

    if (data.ok && data.valid) {
      // PIN verified successfully
      console.log('✅ Logged in as admin');
      
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('dashboard').style.display = 'block';
      startPolling();
    } else {
      document.getElementById('pinInput').classList.add('error');
      setTimeout(function(){ document.getElementById('pinInput').classList.remove('error') }, 500);
      document.getElementById('pinInput').value = '';
      document.getElementById('pinInput').focus();
    }
  } catch(e) {
    alert('Connection error: ' + e.message);
  }
  btn.textContent = 'Enter Dashboard';
  btn.disabled = false;
}

// ══════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════
async function api(action, data) {
  try {
    var body = Object.assign({ action:action }, data || {});
    var resp = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    return await resp.json();
  } catch(e) {
    return { ok:false, error:e.message };
  }
}

// ══════════════════════════════════════════════════════════
// POLLING
// ══════════════════════════════════════════════════════════
function startPolling() {
  loadOrders();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadOrders, POLL_INTERVAL);
}

async function loadOrders() {
  var result = await api('getOrders');
  if (!result.ok || !result.orders) return;

  allOrders = result.orders;
  renderStats();
  renderFilters();
  renderOrders();
}

// ══════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════
function renderStats() {
  var today = new Date().toDateString();
  var todayOrders = allOrders.filter(function(o) {
    try { return new Date(o.createdAt).toDateString() === today } catch(e) { return false }
  });

  var totalSales = 0;
  var completed = 0;
  var active = 0;

  todayOrders.forEach(function(o) {
    if (o.status === 'COMPLETED') {
      completed++;
      var orderTotal = 0;
      if (o.subtotal && typeof o.subtotal === 'number') {
        orderTotal = o.subtotal + (o.serviceCharge || 0);
      } else if (o.items && o.items.length) {
        o.items.forEach(function(it){ orderTotal += (it.price || 0) * (it.qty || 1) });
      }
      totalSales += orderTotal;
    }
    if (o.status === 'NEW' || o.status === 'PREPARING' || o.status === 'READY') {
      active++;
    }
  });

  document.getElementById('statSales').textContent = '₱' + totalSales.toLocaleString();
  document.getElementById('statOrders').textContent = todayOrders.length;
  document.getElementById('statActive').textContent = active;

  // Count pending payments across all orders
  var pendingPayments = allOrders.filter(function(o){ return o.paymentStatus === 'SUBMITTED' }).length;
  document.getElementById('pendingCount').textContent = pendingPayments;
  pendingPayCount = pendingPayments;
}

// ══════════════════════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════════════════════
function renderFilters() {
  var counts = { ALL:0, ACTIVE:0, NEW:0, PREPARING:0, READY:0, COMPLETED:0, CANCELLED:0, PLATFORM:0 };
  allOrders.forEach(function(o) {
    counts.ALL++;
    counts[o.status] = (counts[o.status] || 0) + 1;
    if (o.status === 'NEW' || o.status === 'PREPARING' || o.status === 'READY') counts.ACTIVE++;
    if (o.platform) counts.PLATFORM++;
  });

  var tabs = [
    { key:'ACTIVE', label:'🔥 Active', count:counts.ACTIVE },
    { key:'NEW', label:'🔔 New', count:counts.NEW },
    { key:'PREPARING', label:'👨‍🍳 Preparing', count:counts.PREPARING },
    { key:'READY', label:'✨ Ready', count:counts.READY },
    { key:'COMPLETED', label:'🎉 Done', count:counts.COMPLETED },
    { key:'PLATFORM', label:'📦 Platform', count:counts.PLATFORM },
    { key:'ALL', label:'All', count:counts.ALL },
    { key:'PAYMENTS', label:'💳 Payments', count:pendingPayCount }
  ];

  document.getElementById('filterBar').innerHTML = tabs.map(function(t) {
    return '<button class="filter-btn' + (currentFilter===t.key?' active':'') + '" onclick="setFilter(\'' + t.key + '\')">' +
      t.label + '<span class="filter-count">' + t.count + '</span></button>';
  }).join('');
}

function setFilter(f) {
  currentFilter = f;
  renderFilters();
  
  if (f === 'PAYMENTS') {
    document.getElementById('orderGrid').style.display = 'none';
    document.getElementById('paymentsView').style.display = 'block';
    loadPayments();
  } else {
    document.getElementById('orderGrid').style.display = '';
    document.getElementById('paymentsView').style.display = 'none';
    renderOrders();
  }
}

// ══════════════════════════════════════════════════════════
// RENDER ORDERS
// ══════════════════════════════════════════════════════════
function renderOrders() {
  var filtered = allOrders.filter(function(o) {
    if (currentFilter === 'ALL') return true;
    if (currentFilter === 'ACTIVE') return o.status === 'NEW' || o.status === 'PREPARING' || o.status === 'READY';
    if (currentFilter === 'PLATFORM') return !!o.platform;
    return o.status === currentFilter;
  });

  // Sort: NEW first, then PREPARING, then READY, newest first within status
  var statusOrder = { NEW:0, PREPARING:1, READY:2, COMPLETED:3, CANCELLED:4 };
  filtered.sort(function(a,b) {
    var sa = statusOrder[a.status] || 9, sb = statusOrder[b.status] || 9;
    if (sa !== sb) return sa - sb;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });

  if (filtered.length === 0) {
    document.getElementById('orderGrid').innerHTML =
      '<div class="empty-state"><div class="empty-icon">☕</div><div class="empty-text">No orders here yet</div></div>';
    return;
  }

  document.getElementById('orderGrid').innerHTML = filtered.map(function(o) {
    var cfg = STATUS_CONFIG[o.status] || STATUS_CONFIG.NEW;
    var time = '';
    try {
      var d = new Date(o.createdAt);
      time = d.toLocaleTimeString('en-PH', { hour:'numeric', minute:'2-digit', hour12:true });
    } catch(e) {}

    var elapsed = '';
    try {
      var mins = Math.floor((Date.now() - new Date(o.createdAt).getTime()) / 60000);
      if (mins < 1) elapsed = 'just now';
      else if (mins < 60) elapsed = mins + 'm ago';
      else elapsed = Math.floor(mins/60) + 'h ' + (mins%60) + 'm ago';
    } catch(e) {}

    var html = '<div class="order-card" data-status="' + o.status + '"' + (o.platform ? ' data-platform="' + esc(o.platform) + '"' : '') + '>';

    // Header
    html += '<div class="oc-header">' +
      '<div class="oc-id">' + esc(o.orderId) + '</div>';
    
    // Platform badge (if platform order)
    if (o.platform) {
      var platClass = o.platform === 'GRAB' ? 'grab' : (o.platform === 'FOODPANDA' ? 'foodpanda' : 'other');
      var platIcon = o.platform === 'GRAB' ? '🟢' : (o.platform === 'FOODPANDA' ? '🟠' : '🟣');
      html += '<span class="oc-platform-badge ' + platClass + '">' + platIcon + ' ' + esc(o.platform) + '</span>';
    }
    
    html += '<span class="oc-status-badge ' + cfg.badge + '">' + cfg.icon + ' ' + cfg.label + '</span>' +
    '</div>';

    // Platform ref (if exists)
    if (o.platformRef) {
      html += '<div class="oc-platform-ref">📦 Ref: ' + esc(o.platformRef) + '</div>';
    }

    // Meta
    var isPlatform = !!o.platform;
    var tableLabel = isPlatform ? '📦 ' + esc(o.platform) : '🪑 Table ' + esc(String(o.table || '?'));
    var typeIcon = isPlatform ? '🚴' : (o.orderType==='TAKE-OUT'?'🥡':'🍽️');
    var typeLabel = isPlatform ? 'Rider Pickup' : esc(o.orderType || '');
    
    html += '<div class="oc-meta">' +
      '<div class="oc-meta-item">' + tableLabel + '</div>' +
      (o.customer ? '<div class="oc-meta-item">👤 ' + esc(o.customer) + '</div>' : '') +
      '<div class="oc-meta-item">' + typeIcon + ' ' + typeLabel + '</div>' +
      '<div class="oc-meta-item">🕐 ' + esc(time) + '</div>' +
      '<div class="oc-meta-item" style="opacity:.6">' + esc(elapsed) + '</div>' +
    '</div>';

    // Items
    html += '<div class="oc-items">';
    var orderTotal = 0;
    if (o.items && o.items.length) {
      o.items.forEach(function(it) {
        var opts = [];
        if (it.size) opts.push(capitalize(it.size));
        if (it.sugar) opts.push(capitalize(it.sugar));
        var lineTotal = (it.price || 0) * (it.qty || 1);
        orderTotal += lineTotal;

        html += '<div class="oc-item">' +
          '<div class="oc-item-qty">' + (it.qty || 1) + '×</div>' +
          '<div class="oc-item-info">' +
            '<div class="oc-item-name">' + esc(it.name) + '</div>' +
            (opts.length ? '<div class="oc-item-opts">' + esc(opts.join(' · ')) + '</div>' : '') +
            (it.notes ? '<div class="oc-item-notes">"' + esc(it.notes) + '"</div>' : '') +
          '</div>' +
        '</div>';
      });
    }
    html += '</div>';

    // Total — prefer subtotal+service from backend, fallback to item sum
    var displayTotal = orderTotal;
    if (o.subtotal && typeof o.subtotal === 'number') {
      displayTotal = o.subtotal + (o.serviceCharge || 0);
    }
    var scLine = (o.serviceCharge && typeof o.serviceCharge === 'number' && o.serviceCharge > 0)
      ? ' <span style="font-size:.7rem;font-weight:500;color:var(--timber)">(incl. ₱' + o.serviceCharge.toLocaleString() + ' svc)</span>' : '';
    html += '<div class="oc-total">₱' + displayTotal.toLocaleString() + scLine + '</div>';

    // Payment status
    if (o.paymentStatus === 'PLATFORM_PAID') {
      html += '<div class="oc-payment verified">📦 Platform Handles Payment</div>';
    } else if (o.paymentStatus === 'SUBMITTED') {
      html += '<div class="oc-payment submitted">💳 Payment Submitted · Pending Verification</div>';
    } else if (o.paymentStatus === 'VERIFIED') {
      html += '<div class="oc-payment verified">✅ Payment Verified</div>';
    } else {
      html += '<div class="oc-payment none">⏳ No payment yet</div>';
    }

    // Notes
    if (o.notes && typeof o.notes === 'string' && o.notes.trim()) {
      html += '<div class="oc-notes">📝 ' + esc(o.notes) + '</div>';
    }

    // Actions
    if (cfg.actions.length) {
      html += '<div class="oc-actions">';
      cfg.actions.forEach(function(act) {
        if (act === 'start') html += '<button class="oc-btn oc-btn-start" onclick="updateStatus(\'' + o.orderId + '\',\'PREPARING\')">☕ Start Preparing</button>';
        if (act === 'ready') html += '<button class="oc-btn oc-btn-ready" onclick="updateStatus(\'' + o.orderId + '\',\'READY\')">✨ Mark Ready</button>';
        if (act === 'complete') html += '<button class="oc-btn oc-btn-complete" onclick="updateStatus(\'' + o.orderId + '\',\'COMPLETED\')">🙏 Complete</button>';
        if (act === 'cancel') html += '<button class="oc-btn oc-btn-cancel" onclick="updateStatus(\'' + o.orderId + '\',\'CANCELLED\')">✕</button>';
      });
      html += '</div>';
    }

    // Print Receipt button (always visible)
    html += '<button class="oc-btn oc-btn-print" onclick="printReceipt(\'' + o.orderId + '\')">🖨️ Print Receipt</button>';

    // Delete button (only for completed/cancelled orders)
    if (o.status === 'COMPLETED' || o.status === 'CANCELLED') {
      html += '<button class="oc-btn oc-btn-delete" onclick="deleteOrder(\'' + o.orderId + '\')">🗑️ Delete</button>';
    }

    html += '</div>';
    return html;
  }).join('');
}

// ══════════════════════════════════════════════════════════
// STATUS UPDATE
// ══════════════════════════════════════════════════════════
async function updateStatus(orderId, newStatus) {
  if (newStatus === 'CANCELLED') {
    if (!confirm('Cancel order ' + orderId + '?')) return;
  }

  var result = await api('updateOrderStatus', { orderId:orderId, status:newStatus });
  if (result.ok) {
    // Update local state immediately for responsiveness
    allOrders.forEach(function(o) {
      if (o.orderId === orderId) o.status = newStatus;
    });
    renderStats();
    renderFilters();
    renderOrders();
  } else {
    alert('Failed: ' + (result.error || 'Unknown error'));
  }
}

// ══════════════════════════════════════════════════════════
// DELETE ORDER
// ══════════════════════════════════════════════════════════
async function deleteOrder(orderId) {
  if (!confirm('⚠️ DELETE ORDER ' + orderId + '?\n\nThis will permanently remove the order from the database.\n\nThis action cannot be undone!')) {
    return;
  }
  
  try {
    var result = await api('deleteOrder', { orderId: orderId });
    
    if (result.ok) {
      // Remove from local state
      allOrders = allOrders.filter(function(o) { return o.orderId !== orderId; });
      
      renderStats();
      renderFilters();
      renderOrders();
      
      alert('✅ Order ' + orderId + ' deleted successfully');
    } else {
      alert('❌ Failed to delete: ' + (result.error || 'Unknown error'));
    }
  } catch (error) {
    alert('❌ Error: ' + error.message);
  }
}

// Bulk delete orders older than X days
async function bulkDeleteOldOrders() {
  var daysAgo = 3; // Delete orders older than 3 days
  var cutoffDate = new Date();
  cutoffDate.setDate(cutoffDate.getDate() - daysAgo);
  
  // Find old orders
  var oldOrders = allOrders.filter(function(o) {
    var orderDate = new Date(o.createdAt);
    return orderDate < cutoffDate;
  });
  
  if (oldOrders.length === 0) {
    alert('ℹ️ No orders older than ' + daysAgo + ' days found.');
    return;
  }
  
  var msg = '⚠️ DELETE ' + oldOrders.length + ' ORDERS?\n\n';
  msg += 'This will permanently delete all orders older than ' + daysAgo + ' days:\n\n';
  msg += '• Total orders to delete: ' + oldOrders.length + '\n';
  msg += '• Oldest order: ' + oldOrders[oldOrders.length - 1].orderId + '\n';
  msg += '• Newest old order: ' + oldOrders[0].orderId + '\n\n';
  msg += 'This action CANNOT be undone!\n\nContinue?';
  
  if (!confirm(msg)) return;
  
  // Final confirmation
  if (!confirm('⚠️ FINAL CONFIRMATION\n\nAre you ABSOLUTELY SURE you want to delete ' + oldOrders.length + ' orders?\n\nThis is your last chance to cancel.')) {
    return;
  }
  
  try {
    var deleted = 0;
    var failed = 0;
    
    for (var i = 0; i < oldOrders.length; i++) {
      var result = await api('deleteOrder', { orderId: oldOrders[i].orderId });
      
      if (result.ok) {
        deleted++;
        allOrders = allOrders.filter(function(o) { return o.orderId !== oldOrders[i].orderId; });
      } else {
        failed++;
        console.error('Failed to delete ' + oldOrders[i].orderId + ':', result.error);
      }
      
      // Update UI every 5 orders
      if (i % 5 === 0) {
        renderStats();
        renderFilters();
        renderOrders();
      }
    }
    
    // Final update
    renderStats();
    renderFilters();
    renderOrders();
    
    var summary = '✅ BULK DELETE COMPLETE\n\n';
    summary += '• Deleted: ' + deleted + ' orders\n';
    if (failed > 0) {
      summary += '• Failed: ' + failed + ' orders\n';
    }
    
    alert(summary);
    
  } catch (error) {
    alert('❌ Error during bulk delete: ' + error.message);
  }
}

// ══════════════════════════════════════════════════════════
// PRINT RECEIPT
// ══════════════════════════════════════════════════════════
function printReceipt(orderId) {
  var o = allOrders.find(function(x) { return x.orderId === orderId; });
  if (!o) { alert('Order not found'); return; }

  // Calculate totals
  var itemsTotal = 0;
  var itemRows = '';
  if (o.items && o.items.length) {
    o.items.forEach(function(it) {
      var opts = [];
      if (it.size) opts.push(it.size);
      if (it.sugar) opts.push(it.sugar);
      var lineTotal = (it.price || 0) * (it.qty || 1);
      itemsTotal += lineTotal;
      itemRows += '<tr>' +
        '<td style="padding:3px 20px 3px 0;font-weight:bold;font-size:10pt !important;">' + esc(it.name) +
        (opts.length ? '<br><span style="font-size:9pt !important;color:#555;">' + esc(opts.join(' | ')) + '</span>' : '') +
        '</td>' +

// UTILS
// ══════════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function capitalize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

// PAYMENTS MANAGEMENT
// ══════════════════════════════════════════════════════════

async function loadPayments() {
  var result = await api('listPayments', {});
  if (result.ok) {
    allPayments = result.payments || [];
    pendingPayCount = allPayments.filter(function(p){ return p.status === 'PENDING' }).length;
    document.getElementById('pendingCount').textContent = pendingPayCount;
    renderPayFilters();
    renderPayCards();
    renderFilters(); // Update the count on the Payments tab
  }
}

function renderPayFilters() {
  var counts = { ALL:0, PENDING:0, VERIFIED:0, REJECTED:0 };
  allPayments.forEach(function(p) {
    counts.ALL++;
    counts[p.status] = (counts[p.status] || 0) + 1;
  });

  var tabs = [
    { key:'PENDING', label:'⏳ Pending', count:counts.PENDING },
    { key:'VERIFIED', label:'✅ Verified', count:counts.VERIFIED },
    { key:'REJECTED', label:'❌ Rejected', count:counts.REJECTED },
    { key:'ALL', label:'All', count:counts.ALL }
  ];

  document.getElementById('payFilters').innerHTML = tabs.map(function(t) {
    return '<button class="pay-filter-btn' + (payFilter===t.key?' active':'') + '" onclick="setPayFilter(\'' + t.key + '\')">' +
      t.label + ' <span style="opacity:.6">' + t.count + '</span></button>';
  }).join('');
}

function setPayFilter(f) {
  payFilter = f;
  renderPayFilters();
  renderPayCards();
}

function renderPayCards() {
  var filtered = allPayments.filter(function(p) {
    if (payFilter === 'ALL') return true;
    return p.status === payFilter;
  });

  // Sort: PENDING first, newest first
  filtered.sort(function(a,b) {
    var order = { PENDING:0, VERIFIED:1, REJECTED:2 };
    var sa = order[a.status] || 9, sb = order[b.status] || 9;
    if (sa !== sb) return sa - sb;
    return new Date(b.uploadedAt || 0) - new Date(a.uploadedAt || 0);
  });

  if (filtered.length === 0) {
    document.getElementById('payGrid').innerHTML =
      '<div class="empty-state"><div class="empty-icon">💳</div><div class="empty-text">No payments here</div></div>';
    return;
  }

  document.getElementById('payGrid').innerHTML = filtered.map(function(p) {
    var statusClass = p.status.toLowerCase();
    var cardClass = 'pay-card' + (statusClass !== 'pending' ? ' ' + statusClass : '');

    // Format time
    var timeStr = '';
    try {
      var d = new Date(p.uploadedAt);
      timeStr = d.toLocaleString('en-PH', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
    } catch(e) { timeStr = p.uploadedAt || ''; }

    var html = '<div class="' + cardClass + '">';

    // Header
    html += '<div class="pay-header">' +
      '<div class="pay-id">' + esc(p.paymentId) + '</div>' +
      '<span class="pay-status ' + statusClass + '">' + esc(p.status) + '</span>' +
    '</div>';

    // Meta row 1: Order + Table + Time
    html += '<div class="pay-meta">' +
      '<div class="pay-meta-item">📋 ' + esc(p.orderId) + '</div>' +
      '<div class="pay-meta-item">🪑 Table ' + esc(String(p.tableNo || '?')) + '</div>' +
      '<div class="pay-meta-item">🕐 ' + esc(timeStr) + '</div>' +
    '</div>';

    // Customer details section
    var custName = p.customerNameFull || p.customerName || '';
    if (custName || p.customerAddress || p.customerTin || p.receiptEmail) {
      html += '<div style="padding:0 16px 8px;font-size:.75rem;border-top:1px solid var(--mist-light);margin:0 0 0;padding-top:8px;">';
      if (custName) html += '<div style="color:var(--forest);font-weight:600;">👤 ' + esc(custName) + '</div>';
      if (p.customerAddress) html += '<div style="color:var(--timber);margin-top:2px;">📍 ' + esc(p.customerAddress) + '</div>';
      if (p.customerTin) html += '<div style="color:var(--timber);margin-top:2px;">🏢 TIN: ' + esc(p.customerTin) + '</div>';
      if (p.receiptEmail) html += '<div style="color:var(--timber);margin-top:2px;">📧 ' + esc(p.receiptEmail) + '</div>';
      html += '</div>';
    }

    // Amount
    html += '<div class="pay-amount">₱' + Number(p.amount || 0).toLocaleString(undefined,{minimumFractionDigits:2}) + '</div>';

    // Receipt info
    if (p.receiptRequested === 'TRUE' || p.receiptType) {
      var rType = p.receiptType ? p.receiptType.toUpperCase() : '';
      var rDel = p.receiptDelivery ? p.receiptDelivery.toUpperCase() : '';
      var rStatus = p.receiptStatus || '';
      
      var rBadgeColor = rStatus === 'SENT' ? '#D1FAE5;color:#065F46' : (rStatus === 'SENT_TO_CAFE' ? '#FEF3C7;color:#92400E' : '#F3F0EB;color:var(--timber)');
      
      html += '<div style="padding:4px 16px 10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;">';
      html += '<span style="padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:700;background:#EDE9FE;color:#6D28D9;">🧾 ' + esc(rType || 'RECEIPT') + '</span>';
      if (rDel) html += '<span style="padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600;background:#F3F0EB;color:var(--timber);">' + (rDel === 'EMAIL' ? '📧' : '🖨️') + ' ' + esc(rDel) + '</span>';
      if (rStatus) html += '<span style="padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600;background:' + rBadgeColor + ';">' + esc(rStatus) + '</span>';
      html += '</div>';
      
      // Receipt file link
      if (p.receiptFileUrl) {
        html += '<div style="padding:0 16px 8px;"><a href="' + esc(p.receiptFileUrl) + '" target="_blank" style="font-size:.72rem;color:var(--forest);font-weight:600;text-decoration:none;">📄 View Receipt PDF</a></div>';
      }
    }

    // Screenshot link
    if (p.fileUrl) {
      html += '<div class="pay-screenshot">' +
        '<a href="' + esc(p.fileUrl) + '" target="_blank">📸 View Payment Screenshot</a>' +
      '</div>';
    }

    // Verified/Rejected info
    if (p.status === 'VERIFIED' && p.verifiedBy) {
      html += '<div style="padding:4px 16px 10px;font-size:.72rem;color:#065F46;">✅ Verified by ' + esc(p.verifiedBy) + (p.verifiedAt ? ' · ' + esc(p.verifiedAt) : '') + '</div>';
    }
    if (p.status === 'REJECTED' && p.notes) {
      html += '<div style="padding:4px 16px 10px;font-size:.72rem;color:#991B1B;">❌ ' + esc(p.notes) + '</div>';
    }

    // Actions (only for PENDING)
    if (p.status === 'PENDING') {
      html += '<div class="pay-actions">' +
        '<button class="pay-btn pay-btn-verify" onclick="doVerifyPayment(\'' + esc(p.paymentId) + '\')">✅ Verify</button>' +
        '<button class="pay-btn pay-btn-reject" onclick="doRejectPayment(\'' + esc(p.paymentId) + '\')">✕ Reject</button>' +
      '</div>';
    }

    html += '</div>';
    return html;
  }).join('');
}

async function doVerifyPayment(paymentId) {
  if (!confirm('Verify payment ' + paymentId + '?\n\nThis will mark it as confirmed and move the screenshot to the processed folder.')) return;

  var result = await api('verifyPayment', { paymentId: paymentId, verifiedBy: 'Staff' });
  if (result.ok) {
    // Refresh payments
    loadPayments();
    // Also refresh orders to update payment badges
    var ordResult = await api('getOrders', { status:'ALL', limit:100 });
    if (ordResult.ok) {
      allOrders = ordResult.orders || [];
      renderStats();
    }
  } else {
    alert('Failed: ' + (result.error || 'Unknown error'));
  }
}

async function doRejectPayment(paymentId) {
  var reason = prompt('Reason for rejecting payment ' + paymentId + ':');
  if (reason === null) return; // Cancelled

  var result = await api('rejectPayment', { paymentId: paymentId, reason: reason, verifiedBy: 'Staff' });
  if (result.ok) {
    loadPayments();
    var ordResult = await api('getOrders', { status:'ALL', limit:100 });
    if (ordResult.ok) {
      allOrders = ordResult.orders || [];
      renderStats();
    }
  } else {
    alert('Failed: ' + (result.error || 'Unknown error'));
  }
}

var poMenuItems = [];
var poCart = [];
var poSelectedPlatform = 'GRAB';
var poSelectedCat = 'ALL';
var poAddingItem = null;  // item being configured (size/sugar)

function openPlatformOrder() {
  poCart = [];
  poSelectedPlatform = 'GRAB';
  poSelectedCat = 'ALL';
  document.getElementById('poRef').value = '';
  document.getElementById('poNotes').value = '';
  document.getElementById('poOverlay').classList.add('open');
  selectPlatform('GRAB');
  loadPlatformMenu();
}

function closePlatformOrder() {
  document.getElementById('poOverlay').classList.remove('open');
}

function selectPlatform(p) {
  poSelectedPlatform = p;
  var btns = document.querySelectorAll('.po-plat-btn');
  btns.forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-platform') === p);
  });
}

async function loadPlatformMenu() {
  var result = await api('getMenu', {});
  if (!result.ok || !result.items) return;
  poMenuItems = result.items;
  renderPoCats();
  renderPoMenu();
}

function renderPoCats() {
  var cats = ['ALL'];
  poMenuItems.forEach(function(it) {
    if (it.category && cats.indexOf(it.category) < 0) cats.push(it.category);
  });
  document.getElementById('poCats').innerHTML = cats.map(function(c) {
    return '<button class="po-cat-btn' + (poSelectedCat===c?' active':'') + '" onclick="setPoCategory(\'' + esc(c) + '\')">' +
      (c === 'ALL' ? '🍽️ All' : esc(c)) + '</button>';
  }).join('');
}

function setPoCategory(c) {
  poSelectedCat = c;
  renderPoCats();
  renderPoMenu();
}

function renderPoMenu() {
  var filtered = poMenuItems.filter(function(it) {
    if (poSelectedCat === 'ALL') return true;
    return it.category === poSelectedCat;
  });

  document.getElementById('poMenuGrid').innerHTML = filtered.map(function(it, idx) {
    var priceStr = it.hasSizes ? ('₱' + it.priceShort + ' - ₱' + it.priceTall) : ('₱' + it.price);
    return '<div class="po-menu-item" onclick="poAddItem(\'' + esc(it.code) + '\')">' +
      '<div class="po-menu-item-cat">' + esc(it.category || '') + '</div>' +
      '<div class="po-menu-item-name">' + esc(it.name) + '</div>' +
      '<div class="po-menu-item-price">' + priceStr + '</div>' +
    '</div>';
  }).join('');
}

function poAddItem(code) {
  var item = poMenuItems.find(function(it) { return it.code === code });
  if (!item) return;

  poAddingItem = {
    code: item.code,
    name: item.name,
    hasSizes: item.hasSizes,
    hasSugar: item.hasSugar,
    price: item.price,
    priceShort: item.priceShort,
    priceMedium: item.priceMedium,
    priceTall: item.priceTall,
    size: '',
    sugarLevel: '',
    qty: 1
  };

  // If has sizes → show size popup
  if (item.hasSizes) {
    showSizePopup();
  } else if (item.hasSugar) {
    showSugarPopup();
  } else {
    // No options — add directly
    poFinishAdd();
  }
}

function showSizePopup() {
  var it = poAddingItem;
  var html = '<div class="po-popup-title">' + esc(it.name) + '</div>'
    + '<div class="po-popup-sub">Choose size</div>'
    + '<div class="po-option" onclick="poSelectSize(\'Short\',' + it.priceShort + ')">'
    +   '<span class="po-option-label">Short (12oz)</span><span class="po-option-price">₱' + it.priceShort + '</span>'
    + '</div>'
    + '<div class="po-option" onclick="poSelectSize(\'Medium\',' + it.priceMedium + ')">'
    +   '<span class="po-option-label">Medium (16oz)</span><span class="po-option-price">₱' + it.priceMedium + '</span>'
    + '</div>'
    + '<div class="po-option" onclick="poSelectSize(\'Tall\',' + it.priceTall + ')">'
    +   '<span class="po-option-label">Tall (22oz)</span><span class="po-option-price">₱' + it.priceTall + '</span>'
    + '</div>';

  document.getElementById('poPopupBox').innerHTML = html;
  document.getElementById('poPopup').classList.add('open');
}

function poSelectSize(size, price) {
  poAddingItem.size = size;
  poAddingItem.price = price;
  document.getElementById('poPopup').classList.remove('open');

  if (poAddingItem.hasSugar) {
    setTimeout(showSugarPopup, 200);
  } else {
    poFinishAdd();
  }
}

function showSugarPopup() {
  var it = poAddingItem;
  var sizeLabel = it.size ? ' · ' + it.size : '';
  var html = '<div class="po-popup-title">' + esc(it.name) + '</div>'
    + '<div class="po-popup-sub">₱' + it.price + sizeLabel + ' — Choose sugar level</div>'
    + '<div class="po-option" onclick="poSelectSugar(\'Grounded\')"><span class="po-option-label">Grounded (25%)</span></div>'
    + '<div class="po-option" onclick="poSelectSugar(\'YANI\')"><span class="po-option-label">YANI (50%) — Signature</span></div>'
    + '<div class="po-option" onclick="poSelectSugar(\'Comfort\')"><span class="po-option-label">Comfort (75%)</span></div>'
    + '<div class="po-option" onclick="poSelectSugar(\'Full Sweet\')"><span class="po-option-label">Full Sweet (100%)</span></div>';

  document.getElementById('poPopupBox').innerHTML = html;
  document.getElementById('poPopup').classList.add('open');
}

function poSelectSugar(level) {
  poAddingItem.sugarLevel = level;
  document.getElementById('poPopup').classList.remove('open');
  poFinishAdd();
}

function poFinishAdd() {
  // Check if same item+size+sugar exists in cart → increment qty
  var existing = poCart.find(function(c) {
    return c.code === poAddingItem.code && c.size === poAddingItem.size && c.sugarLevel === poAddingItem.sugarLevel;
  });

  if (existing) {
    existing.qty++;
  } else {
    poCart.push({
      code: poAddingItem.code,
      name: poAddingItem.name,
      size: poAddingItem.size,
      sugarLevel: poAddingItem.sugarLevel,
      price: poAddingItem.price,
      qty: 1
    });
  }

  poAddingItem = null;
  renderPoCart();
}

function renderPoCart() {
  var cartEl = document.getElementById('poCart');
  var footerEl = document.getElementById('poFooter');

  if (poCart.length === 0) {
    cartEl.style.display = 'none';
    footerEl.style.display = 'none';
    return;
  }

  cartEl.style.display = '';
  footerEl.style.display = '';

  var total = 0;
  var html = '';
  poCart.forEach(function(c, idx) {
    var lineTotal = c.price * c.qty;
    total += lineTotal;
    var opts = [];
    if (c.size) opts.push(c.size);
    if (c.sugarLevel) opts.push(c.sugarLevel);

    html += '<div class="po-cart-item">'
      + '<div style="flex:1">'
      +   '<div class="po-cart-item-name">' + esc(c.name) + '</div>'
      +   (opts.length ? '<div class="po-cart-item-opts">' + esc(opts.join(' · ')) + '</div>' : '')
      + '</div>'
      + '<div class="po-cart-qty">'
      +   '<button onclick="poCartQty(' + idx + ',-1)">−</button>'
      +   '<span style="min-width:20px;text-align:center;font-weight:700;font-size:.8rem">' + c.qty + '</span>'
      +   '<button onclick="poCartQty(' + idx + ',1)">+</button>'
      + '</div>'
      + '<div class="po-cart-item-price">₱' + lineTotal.toLocaleString() + '</div>'
      + '<span class="po-cart-remove" onclick="poCartRemove(' + idx + ')">🗑</span>'
      + '</div>';
  });

  document.getElementById('poCartItems').innerHTML = html;
  document.getElementById('poTotal').textContent = '₱' + total.toLocaleString();
}

function poCartQty(idx, delta) {
  poCart[idx].qty += delta;
  if (poCart[idx].qty < 1) poCart.splice(idx, 1);
  renderPoCart();
}

function poCartRemove(idx) {
  poCart.splice(idx, 1);
  renderPoCart();
}

async function submitPlatformOrder() {
  if (poCart.length === 0) return alert('Cart is empty');

  var btn = document.getElementById('poSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Placing order...';

  var items = poCart.map(function(c) {
    return { code: c.code, size: c.size, sugarLevel: c.sugarLevel, qty: c.qty };
  });

  var result = await api('placePlatformOrder', {
    platform: poSelectedPlatform,
    platformRef: document.getElementById('poRef').value.trim(),
    notes: document.getElementById('poNotes').value.trim(),
    items: items
  });

  btn.disabled = false;
  btn.textContent = '📦 Place Platform Order';

  if (result.ok) {
    closePlatformOrder();
    // Refresh orders
    loadOrders();
    alert('✅ ' + poSelectedPlatform + ' order placed!\n\nOrder: ' + result.orderId +
      '\nTotal: ₱' + Number(result.total).toLocaleString() +
      (result.commissionRate > 0 ? '\nCommission: ' + result.commissionRate + '% = ₱' + Number(result.commissionAmt).toLocaleString() : '') +
      (result.platformRef ? '\nRef: ' + result.platformRef : ''));
  } else {
    alert('❌ Failed: ' + (result.error || 'Unknown error'));
  }
}
</script>
</body>
</html>
